<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="120" x2="285" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="60" y1="225" x2="60" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="280" y="138" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="45" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Dimpled limaçon r = 3 + 2cos θ -->
  <!-- |a/b| = 1.5, between 1 and 2, so dimpled -->
  <path d="M 90 120
           C 90 60, 150 25, 210 25
           C 255 25, 270 70, 270 120
           C 270 170, 255 215, 210 215
           C 150 215, 90 180, 90 120" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Equation -->
  <text x="165" y="210" font-family="serif" font-style="italic" font-size="13">r = 3 + 2cos θ</text>
</svg>