<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5BA3A3"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="30" y1="250" x2="280" y2="250" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="40" y1="260" x2="40" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="275" y="268" font-family="serif" font-style="italic" font-size="16">x</text>
  <text x="25" y="30" font-family="serif" font-style="italic" font-size="16">y</text>
  
  <!-- Tick marks and labels -->
  <line x1="80" y1="245" x2="80" y2="255" stroke="#333" stroke-width="1"/>
  <text x="77" y="268" font-family="serif" font-size="12">1</text>
  
  <line x1="120" y1="245" x2="120" y2="255" stroke="#333" stroke-width="1"/>
  <text x="117" y="268" font-family="serif" font-size="12">2</text>
  
  <line x1="160" y1="245" x2="160" y2="255" stroke="#333" stroke-width="1"/>
  <text x="157" y="268" font-family="serif" font-size="12">3</text>
  
  <line x1="200" y1="245" x2="200" y2="255" stroke="#333" stroke-width="1"/>
  <text x="197" y="268" font-family="serif" font-size="12">4</text>
  
  <line x1="240" y1="245" x2="240" y2="255" stroke="#333" stroke-width="1"/>
  <text x="237" y="268" font-family="serif" font-size="12">5</text>
  
  <line x1="35" y1="170" x2="45" y2="170" stroke="#333" stroke-width="1"/>
  <text x="22" y="174" font-family="serif" font-size="12">2</text>
  
  <line x1="35" y1="90" x2="45" y2="90" stroke="#333" stroke-width="1"/>
  <text x="22" y="94" font-family="serif" font-size="12">4</text>
  
  <line x1="35" y1="50" x2="45" y2="50" stroke="#333" stroke-width="1"/>
  <text x="22" y="54" font-family="serif" font-size="12">6</text>
  
  <!-- Line segment with arrow -->
  <line x1="80" y1="170" x2="200" y2="50" stroke="#5BA3A3" stroke-width="2.5" marker-end="url(#arrowhead-teal)"/>
  
  <!-- Points -->
  <circle cx="80" cy="170" r="5" fill="#5BA3A3"/>
  <circle cx="200" cy="50" r="5" fill="#5BA3A3"/>
  
  <!-- Point labels -->
  <text x="50" y="185" font-family="serif" font-size="13">(1,2)</text>
  <text x="208" y="45" font-family="serif" font-size="13">(4,6)</text>
  
  <!-- Direction label -->
  <text x="155" y="95" font-family="serif" font-style="italic" font-size="13">t increases</text>
</svg>