<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 260" width="220" height="260">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="120" x2="200" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="110" y1="230" x2="110" y2="10" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="195" y="138" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="95" y="20" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Antenna pattern r = sin²θ (figure-eight/dumbbell) -->
  <!-- Upper lobe -->
  <path d="M 110 120
           C 125 100, 140 65, 110 35
           C 80 65, 95 100, 110 120" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Lower lobe -->
  <path d="M 110 120
           C 125 140, 140 175, 110 205
           C 80 175, 95 140, 110 120" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Antenna element (horizontal bar) -->
  <line x1="100" y1="120" x2="120" y2="120" stroke="#888" stroke-width="3"/>
  
  <!-- Equation -->
  <text x="65" y="250" font-family="serif" font-style="italic" font-size="13">r = sin²θ</text>
</svg>