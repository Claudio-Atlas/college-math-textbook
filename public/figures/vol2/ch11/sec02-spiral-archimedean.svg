<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="15" y1="140" x2="265" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="265" x2="140" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="260" y="158" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="125" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Archimedean spiral r = θ (scaled) -->
  <!-- Multiple turns, constant spacing between turns -->
  <path d="M 140 140
           C 145 138, 148 142, 145 147
           C 142 155, 132 158, 125 152
           C 115 142, 118 125, 132 118
           C 150 108, 172 118, 175 140
           C 178 165, 155 188, 125 185
           C 90 182, 72 145, 80 110
           C 88 72, 135 55, 175 65
           C 220 78, 240 130, 230 180
           C 218 235, 155 262, 90 245
           C 30 228, 5 155, 25 85" 
        fill="none" stroke="#5BA3A3" stroke-width="2"/>
</svg>