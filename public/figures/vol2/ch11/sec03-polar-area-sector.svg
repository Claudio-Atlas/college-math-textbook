<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Light axes -->
  <line x1="30" y1="200" x2="280" y2="200" stroke="#999" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="220" x2="50" y2="20" stroke="#999" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- Polar curve (cardioid-like) -->
  <path d="M 50 200
           Q 100 180, 150 140
           Q 200 100, 250 80
           Q 270 75, 280 80" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Curve label -->
  <text x="245" y="55" font-family="serif" font-style="italic" font-size="13" fill="#5BA3A3">r = f(θ)</text>
  
  <!-- Shaded sector (area element) -->
  <path d="M 50 200
           L 185 105
           A 150 150 0 0 1 155 90
           L 50 200
           Z" 
        fill="#7BAE7B" fill-opacity="0.3" stroke="none"/>
  
  <!-- Bounding rays -->
  <line x1="50" y1="200" x2="230" y2="100" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="238" y="100" font-family="serif" font-style="italic" font-size="11">θ = α</text>
  
  <line x1="50" y1="200" x2="200" y2="65" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="195" y="50" font-family="serif" font-style="italic" font-size="11">θ = β</text>
  
  <!-- Radius line for single sector element -->
  <line x1="50" y1="200" x2="175" y2="98" stroke="#D4A85A" stroke-width="2"/>
  <text x="100" y="160" font-family="serif" font-style="italic" font-size="13" fill="#D4A85A">r</text>
  
  <!-- Small arc for Δθ -->
  <path d="M 175 98 A 3 3 0 0 1 172 96" fill="none" stroke="#D4A85A" stroke-width="2"/>
  <text x="180" y="88" font-family="serif" font-style="italic" font-size="11">Δθ</text>
</svg>