<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="30" y1="100" x2="265" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="180" x2="50" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="260" y="118" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="35" y="30" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Circle r = 4cos(θ): center at (2,0), radius 2, passes through origin -->
  <!-- Scaled: center at (130, 100), radius 80 -->
  <circle cx="130" cy="100" r="80" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Key points -->
  <circle cx="50" cy="100" r="4" fill="#5BA3A3"/>  <!-- Origin -->
  <circle cx="210" cy="100" r="4" fill="#5BA3A3"/> <!-- (4,0) -->
  <circle cx="130" cy="100" r="4" fill="#5BA3A3"/> <!-- Center (2,0) -->
  
  <!-- Labels -->
  <text x="215" y="92" font-family="serif" font-size="11">(4,0)</text>
  <text x="115" y="120" font-family="serif" font-size="10">center</text>
  
  <!-- Equation -->
  <text x="175" y="50" font-family="serif" font-style="italic" font-size="13">r = 4cos θ</text>
</svg>