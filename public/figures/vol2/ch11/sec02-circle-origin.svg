<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="130" x2="245" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="130" y1="240" x2="130" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="240" y="148" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="118" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Circle r = 3 (scaled: radius 90px) -->
  <circle cx="130" cy="130" r="90" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Equation label -->
  <text x="175" y="60" font-family="serif" font-style="italic" font-size="14">r = 3</text>
</svg>