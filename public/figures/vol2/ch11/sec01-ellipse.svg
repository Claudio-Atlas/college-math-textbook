<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-warm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D4A85A"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="120" x2="300" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="160" y1="220" x2="160" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="295" y="138" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="145" y="30" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Ellipse: a=3, b=2, scaled by 35px per unit -->
  <ellipse cx="160" cy="120" rx="105" ry="70" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Direction arrow (counterclockwise arc) -->
  <path d="M 255 95 A 105 70 0 0 1 200 58" fill="none" stroke="#D4A85A" stroke-width="2.5" marker-end="url(#arrowhead-warm)"/>
  
  <!-- Key points -->
  <circle cx="265" cy="120" r="4" fill="#333"/>
  <circle cx="160" cy="50" r="4" fill="#333"/>
  <circle cx="55" cy="120" r="4" fill="#333"/>
  <circle cx="160" cy="190" r="4" fill="#333"/>
  
  <!-- Point labels -->
  <text x="270" y="112" font-family="serif" font-size="12">(3,0)</text>
  <text x="168" y="48" font-family="serif" font-size="12">(0,2)</text>
  <text x="15" y="112" font-family="serif" font-size="12">(−3,0)</text>
  <text x="168" y="205" font-family="serif" font-size="12">(0,−2)</text>
  
  <!-- Semi-axes labels -->
  <text x="135" y="225" font-family="serif" font-style="italic" font-size="12">a=3, b=2</text>
</svg>