<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="120" x2="220" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="120" y1="220" x2="120" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="215" y="138" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="105" y="30" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Astroid: x^(2/3) + y^(2/3) = 1, or x=cos³t, y=sin³t -->
  <!-- Four-cusped hypocycloid -->
  <path d="M 200 120
           C 200 80, 160 40, 120 40
           C 80 40, 40 80, 40 120
           C 40 160, 80 200, 120 200
           C 160 200, 200 160, 200 120" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Cusp points -->
  <circle cx="200" cy="120" r="3" fill="#5BA3A3"/>
  <circle cx="120" cy="40" r="3" fill="#5BA3A3"/>
  <circle cx="40" cy="120" r="3" fill="#5BA3A3"/>
  <circle cx="120" cy="200" r="3" fill="#5BA3A3"/>
</svg>