<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="15" y1="130" x2="245" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="130" y1="245" x2="130" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="240" y="148" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="115" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Four-petaled rose r = 3sin(2θ), n=2 even → 4 petals -->
  <!-- Petals at θ = π/4, 3π/4, 5π/4, 7π/4 -->
  
  <!-- Petal 1: upper right (θ = π/4) -->
  <path d="M 130 130
           Q 175 85, 205 55
           Q 175 85, 130 130" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  <path d="M 130 130 Q 185 75, 200 60 Q 185 75, 130 130" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Petal 2: upper left (θ = 3π/4) -->
  <path d="M 130 130 Q 75 75, 60 60 Q 75 75, 130 130" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Petal 3: lower left (θ = 5π/4) -->
  <path d="M 130 130 Q 75 185, 60 200 Q 75 185, 130 130" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Petal 4: lower right (θ = 7π/4) -->
  <path d="M 130 130 Q 185 185, 200 200 Q 185 185, 130 130" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Equation -->
  <text x="155" y="245" font-family="serif" font-style="italic" font-size="13">r = 3sin(2θ)</text>
</svg>