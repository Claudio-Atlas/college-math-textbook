<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="15" y1="130" x2="305" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="160" y1="145" x2="160" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="298" y="148" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="145" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Witch of Agnesi curve: y = 8/(4+x²), scaled -->
  <!-- Bell-shaped curve, max at (0,2), asymptotic to x-axis -->
  <path d="M 25 128
           Q 50 125, 70 120
           Q 95 110, 115 90
           Q 140 55, 160 40
           Q 180 55, 205 90
           Q 225 110, 250 120
           Q 270 125, 295 128" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Asymptote indication (dashed line at y=0) -->
  <line x1="20" y1="130" x2="300" y2="130" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Maximum point -->
  <circle cx="160" cy="40" r="4" fill="#5BA3A3"/>
  <text x="168" y="38" font-family="serif" font-size="12">(0,2)</text>
</svg>