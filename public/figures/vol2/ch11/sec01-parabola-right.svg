<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 260" width="280" height="260">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-warm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D4A85A"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="30" y1="130" x2="260" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="240" x2="50" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="255" y="148" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="35" y="30" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Parabola x = y² (parametric: x=t², y=t) scaled 40px per unit -->
  <path d="M 210 50 
           Q 140 70 90 90
           Q 60 110 50 130
           Q 60 150 90 170
           Q 140 190 210 210" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Plot points at t = -2, -1, 0, 1, 2 -->
  <circle cx="210" cy="50" r="5" fill="#5BA3A3"/>  <!-- (4, 2) -->
  <circle cx="90" cy="90" r="5" fill="#5BA3A3"/>   <!-- (1, 1) -->
  <circle cx="50" cy="130" r="5" fill="#5BA3A3"/>  <!-- (0, 0) -->
  <circle cx="90" cy="170" r="5" fill="#5BA3A3"/>  <!-- (1, -1) -->
  <circle cx="210" cy="210" r="5" fill="#5BA3A3"/> <!-- (4, -2) -->
  
  <!-- Direction arrow showing t increasing (y increasing) -->
  <path d="M 90 165 L 90 95" fill="none" stroke="#D4A85A" stroke-width="2.5" marker-end="url(#arrowhead-warm)"/>
  
  <!-- Equation label -->
  <text x="160" y="85" font-family="serif" font-style="italic" font-size="14">x = y²</text>
</svg>