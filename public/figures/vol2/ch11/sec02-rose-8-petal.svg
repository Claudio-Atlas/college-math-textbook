<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="15" y1="120" x2="225" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="120" y1="225" x2="120" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="220" y="138" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="105" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Eight-petaled rose r = 2cos(4θ), n=4 even → 8 petals -->
  <!-- 8 petals evenly spaced at 45° intervals -->
  
  <!-- Petals at 0°, 45°, 90°, 135°, 180°, 225°, 270°, 315° -->
  <!-- Right petal -->
  <path d="M 120 120 Q 160 115, 185 120 Q 160 125, 120 120" fill="none" stroke="#5BA3A3" stroke-width="2"/>
  <!-- Upper right -->
  <path d="M 120 120 Q 155 85, 165 75 Q 155 85, 120 120" fill="none" stroke="#5BA3A3" stroke-width="2"/>
  <!-- Top -->
  <path d="M 120 120 Q 125 80, 120 55 Q 115 80, 120 120" fill="none" stroke="#5BA3A3" stroke-width="2"/>
  <!-- Upper left -->
  <path d="M 120 120 Q 85 85, 75 75 Q 85 85, 120 120" fill="none" stroke="#5BA3A3" stroke-width="2"/>
  <!-- Left -->
  <path d="M 120 120 Q 80 115, 55 120 Q 80 125, 120 120" fill="none" stroke="#5BA3A3" stroke-width="2"/>
  <!-- Lower left -->
  <path d="M 120 120 Q 85 155, 75 165 Q 85 155, 120 120" fill="none" stroke="#5BA3A3" stroke-width="2"/>
  <!-- Bottom -->
  <path d="M 120 120 Q 115 160, 120 185 Q 125 160, 120 120" fill="none" stroke="#5BA3A3" stroke-width="2"/>
  <!-- Lower right -->
  <path d="M 120 120 Q 155 155, 165 165 Q 155 155, 120 120" fill="none" stroke="#5BA3A3" stroke-width="2"/>
</svg>