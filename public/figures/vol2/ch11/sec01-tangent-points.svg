<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 260" width="280" height="260">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="30" y1="100" x2="250" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="240" x2="140" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="245" y="118" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="125" y="30" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Curve: x = t³ - 3t, y = t² - 4 (forms a loop-like shape) -->
  <!-- At t=-1.8 to t=1.8 -->
  <path d="M 210 115
           Q 180 130, 140 180
           Q 100 210, 70 200
           Q 50 180, 70 150
           Q 100 125, 140 180
           Q 180 210, 220 190
           Q 235 165, 215 115" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Horizontal tangent point at (0, -4), which maps to canvas (140, 180) -->
  <circle cx="140" cy="180" r="6" fill="#D4A85A"/>
  <text x="148" y="195" font-family="serif" font-size="11" fill="#D4A85A">horiz.</text>
  
  <!-- Vertical tangent points at (-2, -3) and (2, -3) -->
  <!-- t=1: x=-2, y=-3 → canvas (100, 145) -->
  <!-- t=-1: x=2, y=-3 → canvas (180, 145) -->
  <circle cx="80" cy="155" r="6" fill="#7BAE7B"/>
  <text x="50" y="160" font-family="serif" font-size="11" fill="#7BAE7B">vert.</text>
  
  <circle cx="200" cy="155" r="6" fill="#7BAE7B"/>
  <text x="208" y="160" font-family="serif" font-size="11" fill="#7BAE7B">vert.</text>
</svg>