<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" width="260" height="200">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="30" y1="100" x2="245" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="60" y1="185" x2="60" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="230" y="118" font-family="serif" font-size="12">front</text>
  <text x="43" y="25" font-family="serif" font-size="12">side</text>
  
  <!-- Cardioid microphone pattern r = 1 + cos θ -->
  <!-- Maximum pickup in front, null behind -->
  <path d="M 60 100
           C 60 60, 100 30, 140 30
           C 180 30, 210 55, 210 100
           C 210 145, 180 170, 140 170
           C 100 170, 60 140, 60 100" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Microphone symbol -->
  <circle cx="60" cy="100" r="6" fill="#888"/>
  <line x1="54" y1="100" x2="35" y2="100" stroke="#888" stroke-width="2"/>
  <text x="20" y="104" font-family="serif" font-size="10">mic</text>
</svg>