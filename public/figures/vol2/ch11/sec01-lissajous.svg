<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="120" x2="220" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="120" y1="220" x2="120" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="215" y="138" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="105" y="30" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Lissajous figure: x = sin(3t), y = sin(2t), ratio 3:2 -->
  <!-- Creates a figure-8 like pattern with lobes -->
  <path d="M 120 120
           C 160 80, 200 60, 200 120
           C 200 160, 160 180, 120 200
           C 80 180, 40 160, 40 120
           C 40 80, 80 60, 120 40
           C 160 60, 200 80, 200 120
           C 200 160, 160 200, 120 200
           C 80 200, 40 160, 40 120
           C 40 60, 80 40, 120 40
           C 160 40, 200 80, 200 120
           C 200 160, 160 180, 120 120" 
        fill="none" stroke="#5BA3A3" stroke-width="2"/>
  
  <!-- More accurate Lissajous 3:2 approximation -->
  <path d="M 120 120
           Q 170 45, 195 120
           Q 170 195, 120 195
           Q 70 195, 45 120
           Q 70 45, 120 45
           Q 170 45, 195 120
           Q 170 195, 120 195
           Q 70 195, 45 120
           Q 70 45, 120 120" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Label -->
  <text x="85" y="250" font-family="serif" font-style="italic" font-size="13">a:b = 3:2</text>
</svg>