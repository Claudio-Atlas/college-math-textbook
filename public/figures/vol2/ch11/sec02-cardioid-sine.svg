<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="70" x2="220" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="120" y1="285" x2="120" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="215" y="88" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="105" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Cardioid r = 3(1 - sin θ), cusp pointing up, extends downward -->
  <!-- Cusp at θ = π/2 (r=0), max at θ = 3π/2 (r=6) pointing down -->
  <path d="M 120 70
           C 60 70, 30 120, 30 170
           C 30 220, 60 270, 120 270
           C 180 270, 210 220, 210 170
           C 210 120, 180 70, 120 70" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Key points -->
  <circle cx="120" cy="70" r="4" fill="#5BA3A3"/>   <!-- Cusp -->
  <circle cx="120" cy="270" r="4" fill="#5BA3A3"/>  <!-- Max point -->
</svg>