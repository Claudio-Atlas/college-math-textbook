<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Polar grid circles -->
  <circle cx="170" cy="170" r="35" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="170" cy="170" r="70" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="170" cy="170" r="105" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="170" cy="170" r="140" fill="none" stroke="#ddd" stroke-width="1"/>
  
  <!-- Radial lines (every 30°) -->
  <line x1="170" y1="170" x2="320" y2="170" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="291" y2="100" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="240" y2="49" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="170" y2="20" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="100" y2="49" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="49" y2="100" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="20" y2="170" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="49" y2="240" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="100" y2="291" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="170" y2="320" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="240" y2="291" stroke="#ddd" stroke-width="1"/>
  <line x1="170" y1="170" x2="291" y2="240" stroke="#ddd" stroke-width="1"/>
  
  <!-- Axes with arrows -->
  <line x1="15" y1="170" x2="325" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="170" y1="325" x2="170" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <text x="318" y="185" font-family="serif" font-size="12">0</text>
  <text x="158" y="28" font-family="serif" font-size="12">π/2</text>
  
  <!-- Point (a): (3, π/6) -->
  <circle cx="261" cy="118" r="6" fill="#5BA3A3"/>
  <text x="268" y="112" font-family="serif" font-size="11" fill="#5BA3A3">(a) (3, π/6)</text>
  
  <!-- Point (b): (2, 5π/4) -->
  <circle cx="121" cy="220" r="6" fill="#D4A85A"/>
  <text x="75" y="235" font-family="serif" font-size="11" fill="#D4A85A">(b) (2, 5π/4)</text>
  
  <!-- Point (c): (4, -π/3) -->
  <circle cx="240" cy="291" r="6" fill="#7BAE7B"/>
  <text x="248" y="298" font-family="serif" font-size="11" fill="#7BAE7B">(c) (4, -π/3)</text>
  
  <!-- Point (d): (-2, π/4) - same location as (b) -->
  <text x="70" y="290" font-family="serif" font-size="11" fill="#8B5CF6">(d) (-2, π/4)</text>
  <line x1="170" y1="170" x2="220" y2="120" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,2"/>
</svg>