<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="15" y1="140" x2="265" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="265" x2="140" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="260" y="158" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="125" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Three-petaled rose r = 4cos(3θ), n=3 odd → 3 petals -->
  <!-- Petal 1: along positive x-axis (θ=0) -->
  <path d="M 140 140
           Q 200 115, 240 140
           Q 200 165, 140 140" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Petal 2: at θ = 2π/3 (upper left) -->
  <path d="M 140 140
           Q 90 85, 70 55
           Q 105 70, 140 140" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Petal 3: at θ = 4π/3 (lower left) -->
  <path d="M 140 140
           Q 90 195, 70 225
           Q 105 210, 140 140" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Equation -->
  <text x="170" y="250" font-family="serif" font-style="italic" font-size="13">r = 4cos(3θ)</text>
</svg>