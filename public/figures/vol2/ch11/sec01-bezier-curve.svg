<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="30" y1="160" x2="260" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="180" x2="50" y2="20" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="255" y="178" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="35" y="30" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Control polygon (dashed) -->
  <!-- P0=(0,0), P1=(1,2), P2=(3,0) scaled by 60px per unit -->
  <path d="M 50 160 L 110 40 L 230 160" 
        fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Quadratic Bezier curve -->
  <path d="M 50 160 Q 110 40, 230 160" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Control points -->
  <circle cx="50" cy="160" r="5" fill="#333"/>
  <circle cx="110" cy="40" r="5" fill="#333"/>
  <circle cx="230" cy="160" r="5" fill="#333"/>
  
  <!-- Point labels -->
  <text x="35" y="175" font-family="serif" font-style="italic" font-size="12">P₀</text>
  <text x="115" y="35" font-family="serif" font-style="italic" font-size="12">P₁</text>
  <text x="235" y="155" font-family="serif" font-style="italic" font-size="12">P₂</text>
</svg>