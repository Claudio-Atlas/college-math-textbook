<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 160" width="300" height="160">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="80" x2="280" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="145" x2="150" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="275" y="98" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="135" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Generating circle for torus (at distance R from y-axis) -->
  <circle cx="220" cy="80" r="40" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Distance R from origin to center -->
  <line x1="150" y1="85" x2="220" y2="85" stroke="#333" stroke-width="1"/>
  <text x="175" y="100" font-family="serif" font-style="italic" font-size="12">R</text>
  
  <!-- Radius r of the generating circle -->
  <line x1="220" y1="80" x2="260" y2="80" stroke="#333" stroke-width="1"/>
  <text x="232" y="72" font-family="serif" font-style="italic" font-size="12">r</text>
  
  <!-- Axis of revolution (y-axis) indicator -->
  <line x1="150" y1="140" x2="150" y2="20" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="155" y="140" font-family="serif" font-size="10">axis</text>
</svg>