<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-warm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D4A85A"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="130" x2="245" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="130" y1="240" x2="130" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="240" y="148" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="118" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Unit circle -->
  <circle cx="130" cy="130" r="80" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Direction arrow (counterclockwise arc) -->
  <path d="M 205 105 A 80 80 0 0 1 170 55" fill="none" stroke="#D4A85A" stroke-width="2.5" marker-end="url(#arrowhead-warm)"/>
  
  <!-- Key points -->
  <circle cx="210" cy="130" r="4" fill="#333"/>
  <circle cx="130" cy="50" r="4" fill="#333"/>
  <circle cx="50" cy="130" r="4" fill="#333"/>
  <circle cx="130" cy="210" r="4" fill="#333"/>
  
  <!-- Point labels -->
  <text x="215" y="148" font-family="serif" font-size="12">(1,0)</text>
  <text x="138" y="48" font-family="serif" font-size="12">(0,1)</text>
  <text x="8" y="125" font-family="serif" font-size="12">(−1,0)</text>
  <text x="138" y="225" font-family="serif" font-size="12">(0,−1)</text>
  
  <!-- Angle labels -->
  <text x="175" y="48" font-family="serif" font-style="italic" font-size="11">t=π/2</text>
  <text x="218" y="118" font-family="serif" font-style="italic" font-size="11">t=0</text>
</svg>