<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="130" x2="305" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="55" y1="245" x2="55" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="298" y="148" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="40" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Convex limaçon r = 4 + 2cos θ -->
  <!-- |a/b| = 2, so convex (no dimple, no loop) -->
  <ellipse cx="165" cy="130" rx="110" ry="95" fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
</svg>