<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" width="280" height="160">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="15" y1="80" x2="265" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="145" x2="140" y2="15" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="260" y="98" font-family="serif" font-style="italic" font-size="14">x</text>
  <text x="125" y="25" font-family="serif" font-style="italic" font-size="14">y</text>
  
  <!-- Lemniscate r² = 9cos(2θ), figure-eight shape -->
  <!-- Right lobe -->
  <path d="M 140 80
           Q 180 60, 230 80
           Q 180 100, 140 80" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Left lobe -->
  <path d="M 140 80
           Q 100 60, 50 80
           Q 100 100, 140 80" 
        fill="none" stroke="#5BA3A3" stroke-width="2.5"/>
  
  <!-- Equation -->
  <text x="150" y="145" font-family="serif" font-style="italic" font-size="13">r² = 9cos(2θ)</text>
</svg>