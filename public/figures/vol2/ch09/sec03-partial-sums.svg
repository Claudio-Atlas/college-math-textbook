<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background -->
  <rect width="400" height="200" fill="white"/>
  
  <g transform="translate(40,20)">
    <!-- Axes -->
    <line x1="0" y1="140" x2="320" y2="140" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="150" x2="20" y2="20" stroke="#333" stroke-width="1.5"/>
    <polygon points="320,140 314,137 314,143" fill="#333"/>
    <polygon points="20,20 17,26 23,26" fill="#333"/>
    <text x="325" y="144" font-family="serif" font-size="14" font-style="italic">N</text>
    <text x="8" y="18" font-family="serif" font-size="14" font-style="italic">sₙ</text>
    
    <!-- Limit line S -->
    <line x1="20" y1="40" x2="310" y2="40" stroke="#5BA3A3" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="315" y="44" font-family="serif" font-size="14" font-style="italic" fill="#5BA3A3">S</text>
    
    <!-- Step function showing partial sums -->
    <path d="M 20,140 L 60,140 L 60,100 L 100,100 L 100,65 L 140,65 L 140,52 L 180,52 L 180,46 L 220,46 L 220,43 L 260,43 L 260,41.5 L 300,41.5" 
          stroke="#5BA3A3" stroke-width="2" fill="none"/>
    
    <!-- Points -->
    <circle cx="60" cy="100" r="5" fill="#5BA3A3"/>
    <circle cx="100" cy="65" r="5" fill="#5BA3A3"/>
    <circle cx="140" cy="52" r="5" fill="#5BA3A3"/>
    <circle cx="180" cy="46" r="5" fill="#5BA3A3"/>
    <circle cx="220" cy="43" r="5" fill="#5BA3A3"/>
    <circle cx="260" cy="41.5" r="5" fill="#5BA3A3"/>
    
    <!-- Labels -->
    <text x="55" y="115" font-family="serif" font-size="11" font-style="italic">s₁</text>
    <text x="95" y="80" font-family="serif" font-size="11" font-style="italic">s₂</text>
    <text x="145" y="60" font-family="serif" font-size="11" font-style="italic">s₃</text>
    
    <!-- N-axis labels -->
    <text x="60" y="155" font-family="serif" font-size="11" text-anchor="middle">1</text>
    <text x="100" y="155" font-family="serif" font-size="11" text-anchor="middle">2</text>
    <text x="140" y="155" font-family="serif" font-size="11" text-anchor="middle">3</text>
    <text x="180" y="155" font-family="serif" font-size="11" text-anchor="middle">4</text>
    <text x="220" y="155" font-family="serif" font-size="11" text-anchor="middle">5</text>
    <text x="260" y="155" font-family="serif" font-size="11" text-anchor="middle">6</text>
  </g>
  
  <!-- Caption -->
  <text x="200" y="190" font-family="sans-serif" font-size="12" text-anchor="middle">
    Partial sums sₙ = a₁ + a₂ + ⋯ + aₙ approach the sum S
  </text>
</svg>
