<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260">
  <!-- Background -->
  <rect width="300" height="260" fill="white"/>
  
  <!-- Title -->
  <text x="150" y="20" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle">Geometric Series: ½ + ¼ + ⅛ + ··· = 1</text>
  
  <!-- Unit square -->
  <g transform="translate(50,35)">
    <!-- Outer square -->
    <rect x="0" y="0" width="200" height="200" fill="none" stroke="#333" stroke-width="2"/>
    
    <!-- 1/2 (left half) -->
    <rect x="0" y="0" width="100" height="200" fill="#5BA3A3" fill-opacity="0.8"/>
    <text x="50" y="105" font-family="serif" font-size="24" fill="white" text-anchor="middle">½</text>
    
    <!-- 1/4 (upper right quarter) -->
    <rect x="100" y="0" width="100" height="100" fill="#5BA3A3" fill-opacity="0.65"/>
    <text x="150" y="55" font-family="serif" font-size="18" fill="white" text-anchor="middle">¼</text>
    
    <!-- 1/8 (lower right, left half) -->
    <rect x="100" y="100" width="50" height="100" fill="#5BA3A3" fill-opacity="0.5"/>
    <text x="125" y="155" font-family="serif" font-size="14" fill="#333" text-anchor="middle">⅛</text>
    
    <!-- 1/16 (lower right, upper right quarter) -->
    <rect x="150" y="100" width="50" height="50" fill="#5BA3A3" fill-opacity="0.4"/>
    <text x="175" y="128" font-family="serif" font-size="11" fill="#333" text-anchor="middle">1/16</text>
    
    <!-- 1/32 -->
    <rect x="150" y="150" width="25" height="50" fill="#5BA3A3" fill-opacity="0.3"/>
    <text x="162" y="178" font-family="serif" font-size="9" fill="#333" text-anchor="middle">1/32</text>
    
    <!-- 1/64 and beyond -->
    <rect x="175" y="150" width="25" height="25" fill="#5BA3A3" fill-opacity="0.25"/>
    <rect x="175" y="175" width="25" height="25" fill="#5BA3A3" fill-opacity="0.2"/>
    <text x="187" y="192" font-family="serif" font-size="9" fill="#333" text-anchor="middle">···</text>
    
    <!-- Grid lines -->
    <line x1="100" y1="0" x2="100" y2="200" stroke="#333" stroke-width="1.5"/>
    <line x1="100" y1="100" x2="200" y2="100" stroke="#333" stroke-width="1"/>
    <line x1="150" y1="100" x2="150" y2="200" stroke="#333" stroke-width="1"/>
    <line x1="150" y1="150" x2="200" y2="150" stroke="#333" stroke-width="0.75"/>
    <line x1="175" y1="150" x2="175" y2="200" stroke="#333" stroke-width="0.75"/>
    <line x1="175" y1="175" x2="200" y2="175" stroke="#333" stroke-width="0.5"/>
  </g>
  
  <!-- Equation -->
  <text x="150" y="255" font-family="serif" font-size="16" text-anchor="middle">
    The shaded regions fill the entire unit square
  </text>
</svg>
