<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Background -->
  <rect width="400" height="200" fill="white"/>
  
  <g transform="translate(30,20)">
    <!-- Axes -->
    <line x1="0" y1="140" x2="350" y2="140" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="150" x2="20" y2="20" stroke="#333" stroke-width="1.5"/>
    <polygon points="350,140 344,137 344,143" fill="#333"/>
    <polygon points="20,20 17,26 23,26" fill="#333"/>
    <text x="355" y="144" font-family="serif" font-size="14" font-style="italic">n</text>
    <text x="8" y="18" font-family="serif" font-size="14" font-style="italic">sₙ</text>
    
    <!-- Limit line S -->
    <line x1="20" y1="85" x2="340" y2="85" stroke="#5BA3A3" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="8" y="88" font-family="serif" font-size="14" font-style="italic" fill="#5BA3A3">S</text>
    
    <!-- Zigzag line connecting points -->
    <polyline points="50,35 90,130 130,50 170,115 210,60 250,100 290,70 330,90" 
              stroke="#5BA3A3" stroke-width="2" fill="none"/>
    
    <!-- Points -->
    <circle cx="50" cy="35" r="5" fill="#5BA3A3"/>
    <circle cx="90" cy="130" r="5" fill="#5BA3A3"/>
    <circle cx="130" cy="50" r="5" fill="#5BA3A3"/>
    <circle cx="170" cy="115" r="5" fill="#5BA3A3"/>
    <circle cx="210" cy="60" r="5" fill="#5BA3A3"/>
    <circle cx="250" cy="100" r="5" fill="#5BA3A3"/>
    <circle cx="290" cy="70" r="5" fill="#5BA3A3"/>
    <circle cx="330" cy="90" r="5" fill="#5BA3A3"/>
    
    <!-- Labels -->
    <text x="50" y="28" font-family="serif" font-size="11" font-style="italic" text-anchor="middle">s₁</text>
    <text x="90" y="145" font-family="serif" font-size="11" font-style="italic" text-anchor="middle">s₂</text>
    <text x="130" y="43" font-family="serif" font-size="11" font-style="italic" text-anchor="middle">s₃</text>
    <text x="170" y="130" font-family="serif" font-size="11" font-style="italic" text-anchor="middle">s₄</text>
    
    <!-- N-axis labels -->
    <text x="50" y="155" font-family="serif" font-size="10" text-anchor="middle">1</text>
    <text x="90" y="155" font-family="serif" font-size="10" text-anchor="middle">2</text>
    <text x="130" y="155" font-family="serif" font-size="10" text-anchor="middle">3</text>
    <text x="170" y="155" font-family="serif" font-size="10" text-anchor="middle">4</text>
    <text x="210" y="155" font-family="serif" font-size="10" text-anchor="middle">5</text>
    <text x="250" y="155" font-family="serif" font-size="10" text-anchor="middle">6</text>
    <text x="290" y="155" font-family="serif" font-size="10" text-anchor="middle">7</text>
    <text x="330" y="155" font-family="serif" font-size="10" text-anchor="middle">8</text>
  </g>
  
  <!-- Caption -->
  <text x="200" y="190" font-family="sans-serif" font-size="12" text-anchor="middle">
    Partial sums oscillate above and below S, converging
  </text>
</svg>
