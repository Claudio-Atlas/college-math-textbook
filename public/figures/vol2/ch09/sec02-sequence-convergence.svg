<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180">
  <!-- Background -->
  <rect width="520" height="180" fill="white"/>
  
  <!-- Convergent Sequence -->
  <g transform="translate(20,20)">
    <!-- Axes -->
    <line x1="0" y1="120" x2="140" y2="120" stroke="#333" stroke-width="1.5"/>
    <line x1="10" y1="130" x2="10" y2="10" stroke="#333" stroke-width="1.5"/>
    <polygon points="140,120 134,117 134,123" fill="#333"/>
    <polygon points="10,10 7,16 13,16" fill="#333"/>
    <text x="145" y="124" font-family="serif" font-size="12">n</text>
    <text x="5" y="8" font-family="serif" font-size="12" font-style="italic">aₙ</text>
    
    <!-- Limit line -->
    <line x1="10" y1="35" x2="135" y2="35" stroke="#5BA3A3" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="138" y="39" font-family="serif" font-size="12" font-style="italic" fill="#5BA3A3">L</text>
    
    <!-- Epsilon band -->
    <rect x="10" y="25" width="125" height="20" fill="#5BA3A3" fill-opacity="0.2"/>
    
    <!-- Sequence points -->
    <circle cx="25" cy="100" r="4" fill="#5BA3A3"/>
    <circle cx="40" cy="75" r="4" fill="#5BA3A3"/>
    <circle cx="55" cy="55" r="4" fill="#5BA3A3"/>
    <circle cx="70" cy="45" r="4" fill="#5BA3A3"/>
    <circle cx="85" cy="40" r="4" fill="#5BA3A3"/>
    <circle cx="100" cy="37" r="4" fill="#5BA3A3"/>
    <circle cx="115" cy="36" r="4" fill="#5BA3A3"/>
    <circle cx="130" cy="35.5" r="4" fill="#5BA3A3"/>
    
    <text x="55" y="145" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Converges to L</text>
  </g>
  
  <!-- Divergent (unbounded) -->
  <g transform="translate(180,20)">
    <!-- Axes -->
    <line x1="0" y1="120" x2="140" y2="120" stroke="#333" stroke-width="1.5"/>
    <line x1="10" y1="130" x2="10" y2="10" stroke="#333" stroke-width="1.5"/>
    <polygon points="140,120 134,117 134,123" fill="#333"/>
    <polygon points="10,10 7,16 13,16" fill="#333"/>
    <text x="145" y="124" font-family="serif" font-size="12">n</text>
    <text x="5" y="8" font-family="serif" font-size="12" font-style="italic">aₙ</text>
    
    <!-- Sequence points -->
    <circle cx="25" cy="105" r="4" fill="#D4A85A"/>
    <circle cx="40" cy="90" r="4" fill="#D4A85A"/>
    <circle cx="55" cy="75" r="4" fill="#D4A85A"/>
    <circle cx="70" cy="58" r="4" fill="#D4A85A"/>
    <circle cx="85" cy="42" r="4" fill="#D4A85A"/>
    <circle cx="100" cy="28" r="4" fill="#D4A85A"/>
    <circle cx="115" cy="18" r="4" fill="#D4A85A"/>
    
    <!-- Arrow to infinity -->
    <path d="M 125,12 L 135,5" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="138" y="8" font-family="serif" font-size="10">→∞</text>
    
    <text x="55" y="145" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Diverges (→∞)</text>
  </g>
  
  <!-- Divergent (oscillating) -->
  <g transform="translate(340,20)">
    <!-- Axes -->
    <line x1="0" y1="120" x2="140" y2="120" stroke="#333" stroke-width="1.5"/>
    <line x1="10" y1="130" x2="10" y2="10" stroke="#333" stroke-width="1.5"/>
    <polygon points="140,120 134,117 134,123" fill="#333"/>
    <polygon points="10,10 7,16 13,16" fill="#333"/>
    <text x="145" y="124" font-family="serif" font-size="12">n</text>
    <text x="5" y="8" font-family="serif" font-size="12" font-style="italic">aₙ</text>
    
    <!-- Sequence points (oscillating) -->
    <circle cx="25" cy="25" r="4" fill="#D4A85A"/>
    <circle cx="40" cy="100" r="4" fill="#D4A85A"/>
    <circle cx="55" cy="30" r="4" fill="#D4A85A"/>
    <circle cx="70" cy="95" r="4" fill="#D4A85A"/>
    <circle cx="85" cy="35" r="4" fill="#D4A85A"/>
    <circle cx="100" cy="90" r="4" fill="#D4A85A"/>
    <circle cx="115" cy="40" r="4" fill="#D4A85A"/>
    <circle cx="130" cy="85" r="4" fill="#D4A85A"/>
    
    <text x="55" y="145" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Diverges (oscillates)</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>
