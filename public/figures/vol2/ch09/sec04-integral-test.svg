<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <!-- Background -->
  <rect width="480" height="200" fill="white"/>
  
  <!-- Left diagram: Overestimate -->
  <g transform="translate(20,20)">
    <!-- Axes -->
    <line x1="0" y1="130" x2="200" y2="130" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="140" x2="20" y2="10" stroke="#333" stroke-width="1.5"/>
    <polygon points="200,130 194,127 194,133" fill="#333"/>
    <polygon points="20,10 17,16 23,16" fill="#333"/>
    <text x="205" y="134" font-family="serif" font-size="12" font-style="italic">x</text>
    <text x="8" y="10" font-family="serif" font-size="12" font-style="italic">y</text>
    
    <!-- Rectangles (left endpoints - overestimate) -->
    <rect x="40" y="25" width="35" height="105" fill="#5BA3A3" fill-opacity="0.5" stroke="#5BA3A3" stroke-width="1"/>
    <rect x="75" y="55" width="35" height="75" fill="#5BA3A3" fill-opacity="0.5" stroke="#5BA3A3" stroke-width="1"/>
    <rect x="110" y="75" width="35" height="55" fill="#5BA3A3" fill-opacity="0.5" stroke="#5BA3A3" stroke-width="1"/>
    <rect x="145" y="90" width="35" height="40" fill="#5BA3A3" fill-opacity="0.5" stroke="#5BA3A3" stroke-width="1"/>
    
    <!-- Curve y = f(x) -->
    <path d="M 35,30 Q 70,45 85,58 Q 100,72 120,82 Q 140,92 160,100 Q 180,108 195,115" 
          stroke="#D4A85A" stroke-width="2.5" fill="none"/>
    
    <!-- Labels -->
    <text x="190" y="20" font-family="serif" font-size="12" font-style="italic" fill="#D4A85A">y = f(x)</text>
    <text x="40" y="145" font-family="serif" font-size="10">1</text>
    <text x="75" y="145" font-family="serif" font-size="10">2</text>
    <text x="110" y="145" font-family="serif" font-size="10">3</text>
    <text x="145" y="145" font-family="serif" font-size="10">4</text>
    
    <text x="100" y="175" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Σaₙ ≥ ∫f(x)dx</text>
  </g>
  
  <!-- Right diagram: Underestimate -->
  <g transform="translate(250,20)">
    <!-- Axes -->
    <line x1="0" y1="130" x2="200" y2="130" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="140" x2="20" y2="10" stroke="#333" stroke-width="1.5"/>
    <polygon points="200,130 194,127 194,133" fill="#333"/>
    <polygon points="20,10 17,16 23,16" fill="#333"/>
    <text x="205" y="134" font-family="serif" font-size="12" font-style="italic">x</text>
    <text x="8" y="10" font-family="serif" font-size="12" font-style="italic">y</text>
    
    <!-- Rectangles (right endpoints - underestimate) -->
    <rect x="40" y="55" width="35" height="75" fill="#5BA3A3" fill-opacity="0.5" stroke="#5BA3A3" stroke-width="1"/>
    <rect x="75" y="75" width="35" height="55" fill="#5BA3A3" fill-opacity="0.5" stroke="#5BA3A3" stroke-width="1"/>
    <rect x="110" y="90" width="35" height="40" fill="#5BA3A3" fill-opacity="0.5" stroke="#5BA3A3" stroke-width="1"/>
    <rect x="145" y="102" width="35" height="28" fill="#5BA3A3" fill-opacity="0.5" stroke="#5BA3A3" stroke-width="1"/>
    
    <!-- Curve y = f(x) -->
    <path d="M 35,30 Q 70,45 85,58 Q 100,72 120,82 Q 140,92 160,100 Q 180,108 195,115" 
          stroke="#D4A85A" stroke-width="2.5" fill="none"/>
    
    <!-- Labels -->
    <text x="190" y="20" font-family="serif" font-size="12" font-style="italic" fill="#D4A85A">y = f(x)</text>
    <text x="40" y="145" font-family="serif" font-size="10">1</text>
    <text x="75" y="145" font-family="serif" font-size="10">2</text>
    <text x="110" y="145" font-family="serif" font-size="10">3</text>
    <text x="145" y="145" font-family="serif" font-size="10">4</text>
    
    <text x="100" y="175" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Σaₙ ≤ ∫f(x)dx</text>
  </g>
</svg>
