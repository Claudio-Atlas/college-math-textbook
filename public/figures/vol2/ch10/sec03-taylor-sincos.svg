<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220">
  <rect width="520" height="220" fill="white"/>
  
  <!-- Sin(x) graph -->
  <g transform="translate(20,20)">
    <!-- Axes -->
    <line x1="110" y1="0" x2="110" y2="160" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="80" x2="220" y2="80" stroke="#333" stroke-width="1"/>
    <text x="225" y="84" font-family="serif" font-size="11" font-style="italic">x</text>
    <text x="115" y="10" font-family="serif" font-size="11" font-style="italic">y</text>
    
    <!-- sin(x) curve -->
    <path d="M 10,80 Q 35,30 60,30 Q 85,30 110,80 Q 135,130 160,130 Q 185,130 210,80" 
          stroke="#333" stroke-width="2.5" fill="none"/>
    <text x="205" y="65" font-family="serif" font-size="12" font-weight="bold">sin x</text>
    
    <!-- T1: x -->
    <line x1="40" y1="115" x2="180" y2="45" stroke="#D4A85A" stroke-width="1.5"/>
    <text x="175" y="35" font-family="serif" font-size="10" fill="#D4A85A">T₁</text>
    
    <!-- T3: x - x³/6 -->
    <path d="M 30,100 Q 70,50 110,80 Q 150,110 190,60" 
          stroke="#5BA3A3" stroke-width="1.5" fill="none"/>
    <text x="25" y="105" font-family="serif" font-size="10" fill="#5BA3A3">T₃</text>
    
    <!-- T5 -->
    <path d="M 20,85 Q 50,35 80,35 Q 110,80 140,125 Q 170,130 200,75" 
          stroke="#7BAE7B" stroke-width="1.5" fill="none"/>
    <text x="195" y="90" font-family="serif" font-size="10" fill="#7BAE7B">T₅</text>
    
    <text x="110" y="185" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">sin x approximations</text>
  </g>
  
  <!-- Cos(x) graph -->
  <g transform="translate(280,20)">
    <!-- Axes -->
    <line x1="110" y1="0" x2="110" y2="160" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="80" x2="220" y2="80" stroke="#333" stroke-width="1"/>
    <text x="225" y="84" font-family="serif" font-size="11" font-style="italic">x</text>
    <text x="115" y="10" font-family="serif" font-size="11" font-style="italic">y</text>
    
    <!-- cos(x) curve -->
    <path d="M 10,80 Q 35,130 60,130 Q 85,130 110,80 Q 135,30 160,30 Q 185,30 210,80" 
          stroke="#333" stroke-width="2.5" fill="none"/>
    <text x="195" y="95" font-family="serif" font-size="12" font-weight="bold">cos x</text>
    
    <!-- Move cos curve up to start at y=1 -->
    <path d="M 10,30 Q 60,30 110,30 Q 160,30 210,30" 
          stroke="#D4A85A" stroke-width="1.5" fill="none" transform="translate(0,0)"/>
    <!-- T0: 1 -->
    <line x1="30" y1="30" x2="190" y2="30" stroke="#D4A85A" stroke-width="1.5"/>
    <text x="185" y="25" font-family="serif" font-size="10" fill="#D4A85A">T₀</text>
    
    <!-- T2: 1 - x²/2 -->
    <path d="M 40,35 Q 75,50 110,80 Q 145,110 180,145" 
          stroke="#5BA3A3" stroke-width="1.5" fill="none"/>
    <text x="30" y="40" font-family="serif" font-size="10" fill="#5BA3A3">T₂</text>
    
    <!-- T4 -->
    <path d="M 25,25 Q 60,80 100,120 Q 120,130 140,120 Q 180,80 210,25" 
          stroke="#7BAE7B" stroke-width="1.5" fill="none"/>
    <text x="205" y="35" font-family="serif" font-size="10" fill="#7BAE7B">T₄</text>
    
    <text x="110" y="185" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">cos x approximations</text>
  </g>
</svg>
