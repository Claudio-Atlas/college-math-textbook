<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <rect width="400" height="120" fill="white"/>
  
  <g transform="translate(20,40)">
    <!-- Number line -->
    <line x1="0" y1="30" x2="360" y2="30" stroke="#333" stroke-width="2"/>
    <polygon points="360,30 354,27 354,33" fill="#333"/>
    
    <!-- Center point a -->
    <circle cx="180" cy="30" r="5" fill="#5BA3A3"/>
    <text x="180" y="55" font-family="serif" font-size="14" font-style="italic" text-anchor="middle">a</text>
    
    <!-- Left endpoint a-R -->
    <line x1="80" y1="20" x2="80" y2="40" stroke="#333" stroke-width="2"/>
    <text x="80" y="55" font-family="serif" font-size="12" text-anchor="middle">a−R</text>
    <text x="80" y="15" font-family="serif" font-size="14" text-anchor="middle">?</text>
    
    <!-- Right endpoint a+R -->
    <line x1="280" y1="20" x2="280" y2="40" stroke="#333" stroke-width="2"/>
    <text x="280" y="55" font-family="serif" font-size="12" text-anchor="middle">a+R</text>
    <text x="280" y="15" font-family="serif" font-size="14" text-anchor="middle">?</text>
    
    <!-- Radius R arrows -->
    <line x1="80" y1="-5" x2="180" y2="-5" stroke="#5BA3A3" stroke-width="1.5" marker-start="url(#arrow-left)" marker-end="url(#arrow-right)"/>
    <line x1="180" y1="-5" x2="280" y2="-5" stroke="#5BA3A3" stroke-width="1.5" marker-start="url(#arrow-left)" marker-end="url(#arrow-right)"/>
    <text x="130" y="-10" font-family="serif" font-size="12" font-style="italic" fill="#5BA3A3">R</text>
    <text x="230" y="-10" font-family="serif" font-size="12" font-style="italic" fill="#5BA3A3">R</text>
    
    <!-- Convergence region -->
    <line x1="80" y1="30" x2="280" y2="30" stroke="#5BA3A3" stroke-width="4"/>
    
    <!-- Labels -->
    <text x="180" y="-25" font-family="sans-serif" font-size="11" fill="#5BA3A3" text-anchor="middle">Converges</text>
    <text x="40" y="25" font-family="sans-serif" font-size="10" fill="#D4A85A">Diverges</text>
    <text x="320" y="25" font-family="sans-serif" font-size="10" fill="#D4A85A">Diverges</text>
  </g>
  
  <text x="200" y="105" font-family="sans-serif" font-size="11" text-anchor="middle">
    Check endpoints separately (may converge or diverge)
  </text>
  
  <defs>
    <marker id="arrow-left" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="6 0, 6 6, 0 3" fill="#5BA3A3"/>
    </marker>
    <marker id="arrow-right" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#5BA3A3"/>
    </marker>
  </defs>
</svg>
