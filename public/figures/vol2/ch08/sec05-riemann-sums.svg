<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220">
  <!-- Background -->
  <rect width="500" height="220" fill="white"/>
  
  <!-- Title -->
  <text x="250" y="20" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Left and Right Riemann Sums</text>
  
  <!-- LEFT RIEMANN SUM -->
  <text x="125" y="40" font-family="serif" font-size="12" text-anchor="middle" fill="#666">Left Riemann Sum (Lₙ)</text>
  
  <!-- Axes -->
  <line x1="30" y1="180" x2="230" y2="180" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="180" x2="30" y2="50" stroke="#333" stroke-width="1.5"/>
  
  <!-- Left rectangles (underestimate for increasing function) -->
  <rect x="30" y="160" width="40" height="20" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <rect x="70" y="140" width="40" height="40" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <rect x="110" y="115" width="40" height="65" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <rect x="150" y="85" width="40" height="95" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  
  <!-- Curve -->
  <path d="M 30,160 Q 80,145 110,115 Q 140,90 190,60" fill="none" stroke="#ef4444" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="30" y="195" font-family="serif" font-size="11" fill="#333">a</text>
  <text x="185" y="195" font-family="serif" font-size="11" fill="#333">b</text>
  <text x="100" y="210" font-family="serif" font-size="10" fill="#3b82f6">Uses left endpoints</text>
  
  <!-- RIGHT RIEMANN SUM -->
  <text x="375" y="40" font-family="serif" font-size="12" text-anchor="middle" fill="#666">Right Riemann Sum (Rₙ)</text>
  
  <!-- Axes -->
  <line x1="280" y1="180" x2="480" y2="180" stroke="#333" stroke-width="1.5"/>
  <line x1="280" y1="180" x2="280" y2="50" stroke="#333" stroke-width="1.5"/>
  
  <!-- Right rectangles (overestimate for increasing function) -->
  <rect x="280" y="140" width="40" height="40" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1"/>
  <rect x="320" y="115" width="40" height="65" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1"/>
  <rect x="360" y="85" width="40" height="95" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1"/>
  <rect x="400" y="60" width="40" height="120" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1"/>
  
  <!-- Curve -->
  <path d="M 280,160 Q 330,145 360,115 Q 390,90 440,60" fill="none" stroke="#ef4444" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="280" y="195" font-family="serif" font-size="11" fill="#333">a</text>
  <text x="435" y="195" font-family="serif" font-size="11" fill="#333">b</text>
  <text x="350" y="210" font-family="serif" font-size="10" fill="#22c55e">Uses right endpoints</text>
</svg>
