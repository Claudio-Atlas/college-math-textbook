<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <!-- Background -->
  <rect width="400" height="220" fill="white"/>
  
  <!-- Title -->
  <text x="200" y="20" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Type 2: Vertical Asymptote</text>
  <text x="200" y="38" font-family="serif" font-size="12" text-anchor="middle" fill="#666">∫₀¹ 1/√x dx = 2 (converges despite asymptote)</text>
  
  <!-- Axes -->
  <line x1="80" y1="180" x2="350" y2="180" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="180" x2="80" y2="30" stroke="#333" stroke-width="1.5"/>
  
  <!-- Vertical asymptote at x=0 -->
  <line x1="80" y1="180" x2="80" y2="35" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,4"/>
  
  <!-- Shaded area -->
  <path d="M 80,180 L 85,50 Q 120,100 160,130 Q 220,155 300,170 L 300,180 Z" fill="#6366f1" fill-opacity="0.25"/>
  
  <!-- Curve y = 1/√x -->
  <path d="M 85,50 Q 95,75 110,100 Q 140,130 180,150 Q 230,165 300,172" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  
  <!-- Dashed approach to asymptote -->
  <path d="M 85,50 Q 82,40 81,32" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="3,3"/>
  
  <!-- X-axis labels -->
  <text x="80" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">0</text>
  <text x="300" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">1</text>
  <text x="355" y="185" font-family="serif" font-size="12" fill="#333">x</text>
  
  <!-- Y-axis labels -->
  <text x="60" y="35" font-family="serif" font-size="12" fill="#333">y</text>
  <text x="70" y="178" font-family="serif" font-size="10" text-anchor="end" fill="#333">0</text>
  
  <!-- Function label -->
  <text x="140" y="70" font-family="serif" font-size="13" font-style="italic" fill="#6366f1">y = 1/√x</text>
  
  <!-- Asymptote label -->
  <text x="60" y="55" font-family="serif" font-size="10" fill="#6366f1">x = 0</text>
  <text x="45" y="68" font-family="serif" font-size="9" fill="#6366f1">(asymptote)</text>
  
  <!-- Arrow showing limit approach -->
  <path d="M 100,75 Q 95,70 90,68" fill="none" stroke="#333" stroke-width="1"/>
  <text x="110" y="78" font-family="serif" font-size="9" fill="#333">lim</text>
  <text x="108" y="88" font-family="serif" font-size="8" fill="#333">t→0⁺</text>
  
  <!-- Result box -->
  <rect x="230" y="55" width="145" height="55" fill="#eef2ff" stroke="#6366f1" stroke-width="1" rx="4"/>
  <text x="302" y="75" font-family="serif" font-size="10" text-anchor="middle" fill="#333">Finite area despite</text>
  <text x="302" y="90" font-family="serif" font-size="10" text-anchor="middle" fill="#333">vertical asymptote!</text>
  <text x="302" y="105" font-family="serif" font-size="10" text-anchor="middle" fill="#6366f1" font-weight="bold">Area = 2</text>
</svg>
