<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <!-- Background -->
  <rect width="400" height="220" fill="white"/>
  
  <!-- Title -->
  <text x="200" y="20" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Divergent Improper Integral</text>
  <text x="200" y="38" font-family="serif" font-size="12" text-anchor="middle" fill="#666">∫₁^∞ 1/x dx = ∞ (infinite area)</text>
  
  <!-- Axes -->
  <line x1="50" y1="180" x2="380" y2="180" stroke="#333" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="50" y1="180" x2="50" y2="40" stroke="#333" stroke-width="1.5"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Shaded area under curve (divergent - extends to infinity) -->
  <path d="M 80,180 L 80,80 Q 110,110 140,128 Q 180,145 220,155 Q 270,164 330,172 Q 350,174 370,176 L 370,180 Z" fill="#ef4444" fill-opacity="0.3"/>
  
  <!-- Additional shading extending right -->
  <rect x="370" y="175" width="20" height="5" fill="#ef4444" fill-opacity="0.2"/>
  
  <!-- Curve y = 1/x -->
  <path d="M 80,80 Q 100,100 120,118 Q 150,138 180,150 Q 220,160 270,168 Q 320,174 370,177" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  
  <!-- Dashed line to infinity -->
  <line x1="370" y1="177" x2="390" y2="178" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  
  <!-- X-axis labels -->
  <text x="80" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">1</text>
  <text x="160" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">2</text>
  <text x="240" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">3</text>
  <text x="320" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">4</text>
  <text x="385" y="185" font-family="serif" font-size="12" fill="#333">x</text>
  <text x="370" y="195" font-family="serif" font-size="11" fill="#666">→ ∞</text>
  
  <!-- Y-axis label -->
  <text x="45" y="35" font-family="serif" font-size="12" fill="#333">y</text>
  <text x="70" y="85" font-family="serif" font-size="11" text-anchor="end" fill="#333">1</text>
  
  <!-- Function label -->
  <text x="100" y="65" font-family="serif" font-size="13" font-style="italic" fill="#ef4444">y = 1/x</text>
  
  <!-- Result box -->
  <rect x="240" y="55" width="145" height="50" fill="#fef2f2" stroke="#ef4444" stroke-width="1" rx="4"/>
  <text x="312" y="75" font-family="serif" font-size="11" text-anchor="middle" fill="#333">Area = ∞ (infinite)</text>
  <text x="312" y="93" font-family="serif" font-size="11" text-anchor="middle" fill="#ef4444" font-weight="bold">DIVERGES</text>
</svg>
