<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="220" fill="white"/>
  
  <!-- Title -->
  <text x="160" y="20" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Reference Triangle for √(a² − x²)</text>
  <text x="160" y="38" font-family="serif" font-size="12" text-anchor="middle" fill="#666">Substitution: x = a sin θ</text>
  
  <!-- Triangle -->
  <polygon points="60,180 260,180 260,80" fill="none" stroke="#333" stroke-width="2"/>
  
  <!-- Right angle marker -->
  <path d="M 245,180 L 245,165 L 260,165" fill="none" stroke="#333" stroke-width="1.5"/>
  
  <!-- Angle arc at origin -->
  <path d="M 90,180 A 30,30 0 0,0 78,158" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="95" y="165" font-family="serif" font-size="16" font-style="italic" fill="#2563eb">θ</text>
  
  <!-- Labels -->
  <!-- Hypotenuse (a) -->
  <text x="145" y="115" font-family="serif" font-size="18" font-style="italic" fill="#333">a</text>
  
  <!-- Opposite side (x) -->
  <text x="272" y="135" font-family="serif" font-size="18" font-style="italic" fill="#333">x</text>
  
  <!-- Adjacent side √(a² - x²) -->
  <text x="140" y="200" font-family="serif" font-size="16" fill="#333">√(a² − x²)</text>
  
  <!-- Formulas box -->
  <rect x="15" y="55" width="120" height="70" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <text x="25" y="75" font-family="serif" font-size="12" fill="#333">sin θ = x/a</text>
  <text x="25" y="93" font-family="serif" font-size="12" fill="#333">cos θ = √(a²−x²)/a</text>
  <text x="25" y="111" font-family="serif" font-size="12" fill="#333">dx = a cos θ dθ</text>
</svg>
