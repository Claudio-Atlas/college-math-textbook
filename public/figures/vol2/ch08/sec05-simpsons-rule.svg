<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <!-- Background -->
  <rect width="400" height="240" fill="white"/>
  
  <!-- Title -->
  <text x="200" y="20" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Simpson's Rule</text>
  <text x="200" y="38" font-family="serif" font-size="11" text-anchor="middle" fill="#666">Approximates curve with parabolic segments</text>
  
  <!-- Axes -->
  <line x1="40" y1="190" x2="360" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="190" x2="40" y2="50" stroke="#333" stroke-width="1.5"/>
  
  <!-- Shaded area under parabolic approximation -->
  <path d="M 40,190 L 40,160 Q 120,115 200,100 L 200,190 Z" fill="#f97316" fill-opacity="0.2" stroke="none"/>
  <path d="M 200,190 L 200,100 Q 280,82 360,75 L 360,190 Z" fill="#f97316" fill-opacity="0.2" stroke="none"/>
  
  <!-- Actual curve -->
  <path d="M 40,160 Q 100,125 160,105 Q 220,85 280,78 Q 320,72 360,75" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  
  <!-- Parabolic approximation segments -->
  <path d="M 40,160 Q 120,115 200,100" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3"/>
  <path d="M 200,100 Q 280,82 360,75" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3"/>
  
  <!-- Points on curve -->
  <circle cx="40" cy="160" r="4" fill="#333"/>
  <circle cx="120" cy="130" r="4" fill="#333"/>
  <circle cx="200" cy="100" r="4" fill="#333"/>
  <circle cx="280" cy="80" r="4" fill="#333"/>
  <circle cx="360" cy="75" r="4" fill="#333"/>
  
  <!-- X-axis labels -->
  <text x="40" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₀</text>
  <text x="120" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₁</text>
  <text x="200" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₂</text>
  <text x="280" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₃</text>
  <text x="360" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₄</text>
  
  <!-- Coefficient labels -->
  <text x="40" y="150" font-family="serif" font-size="10" text-anchor="middle" fill="#f97316" font-weight="bold">1</text>
  <text x="120" y="118" font-family="serif" font-size="10" text-anchor="middle" fill="#f97316" font-weight="bold">4</text>
  <text x="200" y="88" font-family="serif" font-size="10" text-anchor="middle" fill="#f97316" font-weight="bold">2</text>
  <text x="280" y="68" font-family="serif" font-size="10" text-anchor="middle" fill="#f97316" font-weight="bold">4</text>
  <text x="360" y="63" font-family="serif" font-size="10" text-anchor="middle" fill="#f97316" font-weight="bold">1</text>
  
  <!-- Legend -->
  <line x1="50" y1="55" x2="70" y2="55" stroke="#ef4444" stroke-width="2.5"/>
  <text x="75" y="59" font-family="serif" font-size="10" fill="#333">Actual curve</text>
  <line x1="160" y1="55" x2="180" y2="55" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="185" y="59" font-family="serif" font-size="10" fill="#333">Parabolic fit (coefficients: 1,4,2,4,1)</text>
</svg>
