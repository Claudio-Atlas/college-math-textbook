<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <!-- Background -->
  <rect width="400" height="240" fill="white"/>
  
  <!-- Title -->
  <text x="200" y="20" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">The Trapezoid Rule</text>
  <text x="200" y="38" font-family="serif" font-size="11" text-anchor="middle" fill="#666">Approximates curve with straight line segments</text>
  
  <!-- Axes -->
  <line x1="40" y1="190" x2="360" y2="190" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="190" x2="40" y2="50" stroke="#333" stroke-width="1.5"/>
  
  <!-- Trapezoids -->
  <polygon points="40,190 40,160 120,130 120,190" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>
  <polygon points="120,190 120,130 200,95 200,190" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>
  <polygon points="200,190 200,95 280,75 280,190" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>
  <polygon points="280,190 280,75 360,70 360,190" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>
  
  <!-- Actual curve -->
  <path d="M 40,160 Q 100,125 160,100 Q 220,78 280,72 Q 320,68 360,70" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  
  <!-- Linear approximation (trapezoid tops) -->
  <path d="M 40,160 L 120,130 L 200,95 L 280,75 L 360,70" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Points on curve -->
  <circle cx="40" cy="160" r="4" fill="#333"/>
  <circle cx="120" cy="130" r="4" fill="#333"/>
  <circle cx="200" cy="95" r="4" fill="#333"/>
  <circle cx="280" cy="75" r="4" fill="#333"/>
  <circle cx="360" cy="70" r="4" fill="#333"/>
  
  <!-- X-axis labels -->
  <text x="40" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₀</text>
  <text x="120" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₁</text>
  <text x="200" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₂</text>
  <text x="280" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₃</text>
  <text x="360" y="205" font-family="serif" font-size="11" text-anchor="middle" fill="#333">x₄</text>
  
  <!-- Delta x marker -->
  <line x1="120" y1="215" x2="200" y2="215" stroke="#333" stroke-width="1"/>
  <line x1="120" y1="212" x2="120" y2="218" stroke="#333" stroke-width="1"/>
  <line x1="200" y1="212" x2="200" y2="218" stroke="#333" stroke-width="1"/>
  <text x="160" y="228" font-family="serif" font-size="11" text-anchor="middle" fill="#333">Δx</text>
  
  <!-- Legend -->
  <line x1="50" y1="55" x2="70" y2="55" stroke="#ef4444" stroke-width="2.5"/>
  <text x="75" y="59" font-family="serif" font-size="10" fill="#333">Actual curve f(x)</text>
  <line x1="170" y1="55" x2="190" y2="55" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="195" y="59" font-family="serif" font-size="10" fill="#333">Linear approximation</text>
</svg>
