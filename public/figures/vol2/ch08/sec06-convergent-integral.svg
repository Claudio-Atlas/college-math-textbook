<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <!-- Background -->
  <rect width="400" height="220" fill="white"/>
  
  <!-- Title -->
  <text x="200" y="20" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Convergent Improper Integral</text>
  <text x="200" y="38" font-family="serif" font-size="12" text-anchor="middle" fill="#666">∫₁^∞ 1/x² dx = 1 (finite area)</text>
  
  <!-- Axes -->
  <line x1="50" y1="180" x2="380" y2="180" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="50" y1="180" x2="50" y2="40" stroke="#333" stroke-width="1.5"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Shaded area under curve (convergent) -->
  <path d="M 80,180 L 80,80 Q 120,120 160,145 Q 200,158 250,168 Q 300,174 370,178 L 370,180 Z" fill="#22c55e" fill-opacity="0.3"/>
  
  <!-- Curve y = 1/x² -->
  <path d="M 80,80 Q 100,105 120,125 Q 150,148 180,158 Q 220,168 270,174 Q 320,177 370,179" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  
  <!-- Dashed line to infinity -->
  <line x1="370" y1="179" x2="390" y2="179.5" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
  
  <!-- X-axis labels -->
  <text x="80" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">1</text>
  <text x="160" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">2</text>
  <text x="240" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">3</text>
  <text x="320" y="195" font-family="serif" font-size="12" text-anchor="middle" fill="#333">4</text>
  <text x="385" y="185" font-family="serif" font-size="12" fill="#333">x</text>
  <text x="370" y="195" font-family="serif" font-size="11" fill="#666">→ ∞</text>
  
  <!-- Y-axis label -->
  <text x="45" y="35" font-family="serif" font-size="12" fill="#333">y</text>
  <text x="70" y="85" font-family="serif" font-size="11" text-anchor="end" fill="#333">1</text>
  
  <!-- Function label -->
  <text x="105" y="65" font-family="serif" font-size="13" font-style="italic" fill="#22c55e">y = 1/x²</text>
  
  <!-- Result box -->
  <rect x="240" y="55" width="145" height="50" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" rx="4"/>
  <text x="312" y="75" font-family="serif" font-size="11" text-anchor="middle" fill="#333">Area = 1 (finite)</text>
  <text x="312" y="93" font-family="serif" font-size="11" text-anchor="middle" fill="#22c55e" font-weight="bold">CONVERGES</text>
</svg>
