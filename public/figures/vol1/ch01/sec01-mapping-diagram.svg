<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#f0f4f8"/>
  <!-- Domain set -->
  <ellipse cx="100" cy="100" rx="50" ry="80" fill="none" stroke="#2d5a5a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-family="serif" font-size="14">Domain</text>
  
  <!-- Range set -->
  <ellipse cx="300" cy="100" rx="50" ry="80" fill="none" stroke="#2d5a5a" stroke-width="2"/>
  <text x="300" y="30" text-anchor="middle" font-family="serif" font-size="14">Range</text>
  
  <!-- Domain elements -->
  <text x="100" y="60" text-anchor="middle" font-family="serif" font-size="12">1</text>
  <text x="100" y="85" text-anchor="middle" font-family="serif" font-size="12">2</text>
  <text x="100" y="110" text-anchor="middle" font-family="serif" font-size="12">3</text>
  <text x="100" y="135" text-anchor="middle" font-family="serif" font-size="12">4</text>
  
  <!-- Range elements -->
  <text x="300" y="60" text-anchor="middle" font-family="serif" font-size="12">1</text>
  <text x="300" y="95" text-anchor="middle" font-family="serif" font-size="12">4</text>
  <text x="300" y="130" text-anchor="middle" font-family="serif" font-size="12">9</text>
  <text x="300" y="165" text-anchor="middle" font-family="serif" font-size="12">16</text>
  
  <!-- Arrows -->
  <path d="M 120 55 Q 200 55 280 55" stroke="#2d5a5a" fill="none" marker-end="url(#arrow)"/>
  <path d="M 120 80 Q 200 85 280 90" stroke="#2d5a5a" fill="none" marker-end="url(#arrow)"/>
  <path d="M 120 105 Q 200 115 280 125" stroke="#2d5a5a" fill="none" marker-end="url(#arrow)"/>
  <path d="M 120 130 Q 200 145 280 160" stroke="#2d5a5a" fill="none" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d5a5a"/>
    </marker>
  </defs>
</svg>