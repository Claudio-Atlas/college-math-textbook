<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f0f4f8"/>
  
  <!-- Axes -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="200" y1="280" x2="200" y2="50" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Axis labels -->
  <text x="360" y="205" font-family="serif" font-size="14">x</text>
  <text x="205" y="40" font-family="serif" font-size="14">y</text>
  
  <!-- V-shape for |x| -->
  <polyline points="50,200 200,50 350,200" fill="none" stroke="#2d5a5a" stroke-width="3"/>
  
  <!-- Function label -->
  <text x="280" y="100" font-family="serif" font-size="14" fill="#2d5a5a">f(x) = |x|</text>
  
  <!-- Grid marks -->
  <line x1="100" y1="195" x2="100" y2="205" stroke="#333" stroke-width="1"/>
  <line x1="150" y1="195" x2="150" y2="205" stroke="#333" stroke-width="1"/>
  <line x1="250" y1="195" x2="250" y2="205" stroke="#333" stroke-width="1"/>
  <line x1="300" y1="195" x2="300" y2="205" stroke="#333" stroke-width="1"/>
  
  <text x="97" y="220" font-family="serif" font-size="10">-2</text>
  <text x="147" y="220" font-family="serif" font-size="10">-1</text>
  <text x="250" y="220" font-family="serif" font-size="10">1</text>
  <text x="300" y="220" font-family="serif" font-size="10">2</text>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>
</svg>