<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <rect width="600" height="250" fill="#f0f4f8"/>
  
  <!-- Left graph - Parabola (passes) -->
  <g transform="translate(50, 20)">
    <text x="100" y="15" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold">Function (passes test)</text>
    
    <!-- Axes -->
    <line x1="20" y1="180" x2="180" y2="180" stroke="#333" stroke-width="1.5"/>
    <line x1="100" y1="200" x2="100" y2="30" stroke="#333" stroke-width="1.5"/>
    
    <!-- Parabola y = x² -->
    <path d="M 40,180 Q 70,60 100,30 Q 130,60 160,180" fill="none" stroke="#2d5a5a" stroke-width="2"/>
    
    <!-- Vertical line -->
    <line x1="130" y1="200" x2="130" y2="30" stroke="#c75050" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Single intersection point -->
    <circle cx="130" cy="60" r="5" fill="#c75050"/>
    
    <text x="140" y="45" font-family="serif" font-size="10" fill="#c75050">1 intersection</text>
    <text x="165" y="210" font-family="serif" font-size="10">✓ Function</text>
  </g>
  
  <!-- Right graph - Circle (fails) -->
  <g transform="translate(320, 20)">
    <text x="100" y="15" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold">Not a function (fails test)</text>
    
    <!-- Axes -->
    <line x1="20" y1="130" x2="180" y2="130" stroke="#333" stroke-width="1.5"/>
    <line x1="100" y1="200" x2="100" y2="30" stroke="#333" stroke-width="1.5"/>
    
    <!-- Circle -->
    <circle cx="100" cy="130" r="60" fill="none" stroke="#2d5a5a" stroke-width="2"/>
    
    <!-- Vertical line -->
    <line x1="130" y1="200" x2="130" y2="30" stroke="#c75050" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Two intersection points -->
    <circle cx="130" cy="78" r="5" fill="#c75050"/>
    <circle cx="130" cy="182" r="5" fill="#c75050"/>
    
    <text x="140" y="130" font-family="serif" font-size="10" fill="#c75050">2 intersections</text>
    <text x="155" y="210" font-family="serif" font-size="10">✗ Not a function</text>
  </g>
</svg>