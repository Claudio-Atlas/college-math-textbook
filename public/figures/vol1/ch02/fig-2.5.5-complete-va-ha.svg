<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" width="480" height="380">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="480" height="380" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#f1f5f9" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="330"/>
    <line x1="100" y1="50" x2="100" y2="330"/>
    <line x1="150" y1="50" x2="150" y2="330"/>
    <line x1="200" y1="50" x2="200" y2="330"/>
    <line x1="250" y1="50" x2="250" y2="330"/>
    <line x1="300" y1="50" x2="300" y2="330"/>
    <line x1="350" y1="50" x2="350" y2="330"/>
    <line x1="400" y1="50" x2="400" y2="330"/>
    <line x1="450" y1="50" x2="450" y2="330"/>
    <line x1="50" y1="100" x2="450" y2="100"/>
    <line x1="50" y1="150" x2="450" y2="150"/>
    <line x1="50" y1="200" x2="450" y2="200"/>
    <line x1="50" y1="250" x2="450" y2="250"/>
    <line x1="50" y1="300" x2="450" y2="300"/>
  </g>
  
  <!-- Axes -->
  <line x1="40" y1="200" x2="460" y2="200" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="340" x2="150" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="465" y="205" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="155" y="35" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Tick marks -->
  <line x1="100" y1="197" x2="100" y2="203" stroke="#1e293b" stroke-width="1"/>
  <text x="92" y="218" font-family="serif" font-size="11" fill="#1e293b">−3</text>
  
  <line x1="200" y1="197" x2="200" y2="203" stroke="#1e293b" stroke-width="1"/>
  <text x="200" y="218" font-family="serif" font-size="11" fill="#1e293b">0</text>
  
  <line x1="147" y1="100" x2="153" y2="100" stroke="#1e293b" stroke-width="1"/>
  <text x="132" y="105" font-family="serif" font-size="11" fill="#1e293b">2</text>
  
  <!-- Vertical asymptote at x = -3 (pixel 100) -->
  <line x1="100" y1="50" x2="100" y2="330" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- Horizontal asymptote at y = 2 (pixel 100) -->
  <line x1="40" y1="100" x2="450" y2="100" stroke="#059669" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- f(x) = (2x-1)/(x+3) -->
  <!-- Left branch: x < -3 -->
  <path d="M 45 55 Q 60 70, 75 90 Q 85 110, 92 140 Q 96 180, 98 250" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Right branch: x > -3 -->
  <path d="M 102 250 Q 104 180, 108 140 Q 115 110, 130 95 Q 160 85, 200 90 Q 250 95, 300 98 Q 380 100, 440 101" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Arrows showing limits -->
  <path d="M 420 102 L 445 101" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="400" y="85" font-family="serif" font-size="11" fill="#059669">→ y = 2</text>
  
  <path d="M 55 65 L 48 55" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="55" y="55" font-family="serif" font-size="11" fill="#059669">→ y = 2</text>
  
  <!-- Asymptote labels -->
  <text x="55" y="330" font-family="serif" font-size="12" fill="#dc2626">VA: x = −3</text>
  <text x="380" y="120" font-family="serif" font-size="12" fill="#059669">HA: y = 2</text>
  
  <!-- Function label -->
  <text x="280" y="155" font-family="serif" font-size="15" fill="#2563eb">f(x) = </text>
  <text x="335" y="145" font-family="serif" font-size="14" fill="#2563eb">2x − 1</text>
  <line x1="335" y1="150" x2="390" y2="150" stroke="#2563eb" stroke-width="1"/>
  <text x="345" y="168" font-family="serif" font-size="14" fill="#2563eb">x + 3</text>
  
  <!-- Limit annotations -->
  <text x="250" y="50" font-family="serif" font-size="12" fill="#1e293b">lim f(x) = 2</text>
  <text x="250" y="35" font-family="serif" font-size="9" fill="#1e293b">x→±∞</text>
  
  <text x="55" y="260" font-family="serif" font-size="11" fill="#1e293b">lim = −∞</text>
  <text x="55" y="248" font-family="serif" font-size="8" fill="#1e293b">x→−3⁻</text>
  
  <text x="110" y="260" font-family="serif" font-size="11" fill="#1e293b">lim = +∞</text>
  <text x="110" y="248" font-family="serif" font-size="8" fill="#1e293b">x→−3⁺</text>
  
  <!-- Explanation -->
  <text x="240" y="365" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    Complete asymptote analysis: VA at x = −3, HA at y = 2
  </text>
</svg>
