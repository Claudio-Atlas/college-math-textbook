<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="160" x2="370" y2="160"/>
    <line x1="50" y1="250" x2="370" y2="250"/>
  </g>
  
  <!-- Axes -->
  <line x1="30" y1="160" x2="385" y2="160" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="280" x2="200" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="390" y="165" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="195" y="32" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Origin -->
  <text x="205" y="175" font-family="serif" font-size="11" fill="#1e293b">0</text>
  
  <!-- y = 1 and y = -1 reference lines -->
  <line x1="50" y1="70" x2="370" y2="70" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="50" y1="250" x2="370" y2="250" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="30" y="75" font-family="serif" font-size="11" fill="#94a3b8">1</text>
  <text x="25" y="255" font-family="serif" font-size="11" fill="#94a3b8">−1</text>
  
  <!-- sin(1/x) oscillation - dense near origin -->
  <!-- Far left (smooth) -->
  <path d="M 50 160 Q 60 70, 70 160 Q 80 250, 90 160 Q 100 70, 110 160 Q 120 250, 130 160" 
        stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- Getting denser -->
  <path d="M 130 160 Q 137 70, 144 160 Q 151 250, 158 160 Q 165 70, 172 160 Q 179 250, 186 160" 
        stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- Very dense near origin (simplified visual representation) -->
  <path d="M 186 160 Q 189 70, 192 160 Q 195 250, 198 160" 
        stroke="#2563eb" stroke-width="1.5" fill="none"/>
  
  <!-- Blur effect near zero to show infinite oscillation -->
  <rect x="196" y="70" width="8" height="180" fill="url(#oscillationGradient)"/>
  
  <!-- Manual gradient approximation -->
  <g opacity="0.6">
    <line x1="197" y1="70" x2="197" y2="250" stroke="#2563eb" stroke-width="0.5"/>
    <line x1="198" y1="70" x2="198" y2="250" stroke="#2563eb" stroke-width="0.5"/>
    <line x1="199" y1="70" x2="199" y2="250" stroke="#2563eb" stroke-width="0.5"/>
    <line x1="200" y1="70" x2="200" y2="250" stroke="#2563eb" stroke-width="0.3"/>
    <line x1="201" y1="70" x2="201" y2="250" stroke="#2563eb" stroke-width="0.5"/>
    <line x1="202" y1="70" x2="202" y2="250" stroke="#2563eb" stroke-width="0.5"/>
    <line x1="203" y1="70" x2="203" y2="250" stroke="#2563eb" stroke-width="0.5"/>
  </g>
  
  <!-- Right side -->
  <path d="M 202 160 Q 205 250, 208 160 Q 211 70, 214 160" 
        stroke="#2563eb" stroke-width="1.5" fill="none"/>
  
  <path d="M 214 160 Q 221 250, 228 160 Q 235 70, 242 160 Q 249 250, 256 160 Q 263 70, 270 160" 
        stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <path d="M 270 160 Q 280 250, 290 160 Q 300 70, 310 160 Q 320 250, 330 160 Q 340 70, 350 160 Q 360 250, 370 160" 
        stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- Function label -->
  <text x="280" y="55" font-family="serif" font-size="12" fill="#2563eb">f(x) = sin(1/x)</text>
  
  <!-- Annotation at origin -->
  <text x="210" y="295" font-family="serif" font-size="11" fill="#dc2626">Oscillates infinitely</text>
  <text x="210" y="308" font-family="serif" font-size="11" fill="#dc2626">fast near x = 0</text>
  
  <!-- Arrow pointing to oscillation zone -->
  <path d="M 205 285 L 200 265" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Description box -->
  <rect x="50" y="55" width="140" height="35" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="3"/>
  <text x="60" y="72" font-family="serif" font-size="10" fill="#92400e">
    Oscillatory discontinuity:
  </text>
  <text x="60" y="85" font-family="serif" font-size="10" fill="#92400e">
    No limit exists at x = 0
  </text>
</svg>
