<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="500" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="320" fill="#ffffff"/>
  
  <!-- Dividing line -->
  <line x1="250" y1="30" x2="250" y2="280" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- LEFT PANEL: Hole (removable discontinuity) -->
  <text x="115" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">(a) Hole: Factor Cancels</text>
  
  <!-- Axes for left panel -->
  <line x1="30" y1="200" x2="230" y2="200" stroke="#1e293b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="30" y1="210" x2="30" y2="50" stroke="#1e293b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <text x="235" y="205" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="25" y="45" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- x = 2 tick -->
  <line x1="120" y1="197" x2="120" y2="203" stroke="#1e293b" stroke-width="1"/>
  <text x="117" y="218" font-family="serif" font-size="11" fill="#1e293b">2</text>
  
  <!-- Function: f(x) = (x²-4)/(x-2) = x+2 for x≠2 -->
  <!-- At x=2, y=4; hole there -->
  <line x1="35" y1="175" x2="115" y2="112" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="125" y1="108" x2="220" y2="60" stroke="#2563eb" stroke-width="2.5"/>
  
  <!-- Hole at (2, 4) -->
  <circle cx="120" cy="110" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Function label -->
  <text x="50" y="80" font-family="serif" font-size="12" fill="#2563eb">f(x) = </text>
  <text x="95" y="72" font-family="serif" font-size="11" fill="#2563eb">x² − 4</text>
  <line x1="95" y1="77" x2="135" y2="77" stroke="#2563eb" stroke-width="1"/>
  <text x="102" y="90" font-family="serif" font-size="11" fill="#2563eb">x − 2</text>
  
  <!-- Simplifies to -->
  <text x="145" y="82" font-family="serif" font-size="11" fill="#64748b">= x + 2</text>
  
  <!-- Limit exists note -->
  <text x="115" y="250" font-family="serif" font-size="11" fill="#059669" text-anchor="middle">Limit exists: lim = 4</text>
  <text x="115" y="265" font-family="serif" font-size="10" fill="#059669" text-anchor="middle">x→2</text>
  
  <!-- RIGHT PANEL: Vertical Asymptote -->
  <text x="375" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">(b) VA: Factor Doesn't Cancel</text>
  
  <!-- Axes for right panel -->
  <line x1="280" y1="200" x2="480" y2="200" stroke="#1e293b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="280" y1="210" x2="280" y2="50" stroke="#1e293b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <text x="485" y="205" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="275" y="45" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- x = 2 tick -->
  <line x1="370" y1="197" x2="370" y2="203" stroke="#1e293b" stroke-width="1"/>
  <text x="367" y="218" font-family="serif" font-size="11" fill="#1e293b">2</text>
  
  <!-- Vertical asymptote -->
  <line x1="370" y1="50" x2="370" y2="200" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Function: g(x) = (x+2)/(x-2) -->
  <!-- Left branch going to -∞ -->
  <path d="M 290 195 Q 320 190, 340 175 Q 355 150, 362 100 Q 365 70, 367 55" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Right branch going to +∞ -->
  <path d="M 373 55 Q 375 70, 378 100 Q 385 150, 400 175 Q 420 190, 460 195" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Function label -->
  <text x="410" y="80" font-family="serif" font-size="12" fill="#2563eb">g(x) = </text>
  <text x="455" y="72" font-family="serif" font-size="11" fill="#2563eb">x + 2</text>
  <line x1="455" y1="77" x2="490" y2="77" stroke="#2563eb" stroke-width="1"/>
  <text x="462" y="90" font-family="serif" font-size="11" fill="#2563eb">x − 2</text>
  
  <!-- VA label -->
  <text x="385" y="140" font-family="serif" font-size="11" fill="#dc2626">VA</text>
  
  <!-- Limit DNE note -->
  <text x="375" y="250" font-family="serif" font-size="11" fill="#dc2626" text-anchor="middle">Limit DNE: →±∞</text>
  <text x="375" y="265" font-family="serif" font-size="10" fill="#dc2626" text-anchor="middle">x→2</text>
  
  <!-- Bottom explanation -->
  <text x="250" y="300" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    Key: If (x−a) cancels in num. and denom., it's a hole. If not, it's a VA.
  </text>
</svg>
