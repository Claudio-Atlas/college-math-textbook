<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 380" width="450" height="380">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
    <linearGradient id="squeezeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="450" height="380" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="40" y1="280" x2="420" y2="280" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="40" y1="290" x2="40" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="425" y="285" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="35" y="30" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- x = a tick -->
  <line x1="225" y1="277" x2="225" y2="283" stroke="#1e293b" stroke-width="1.5"/>
  <text x="220" y="298" font-family="serif" font-size="13" font-style="italic" fill="#1e293b">a</text>
  
  <!-- y = L tick -->
  <line x1="37" y1="140" x2="43" y2="140" stroke="#1e293b" stroke-width="1.5"/>
  <text x="25" y="145" font-family="serif" font-size="13" font-style="italic" fill="#1e293b">L</text>
  
  <!-- Shaded region between g and h (the "squeeze zone") -->
  <path d="M 80 230 Q 120 200, 150 170 Q 180 150, 225 140 Q 270 130, 300 125 Q 340 115, 380 100
           L 380 80 Q 340 95, 300 105 Q 270 115, 225 140 Q 180 165, 150 195 Q 120 220, 80 245 Z" 
        fill="url(#squeezeGrad)" stroke="none"/>
  
  <!-- Upper bound h(x) -->
  <path d="M 60 250 Q 100 215, 140 180 Q 180 150, 225 140 Q 270 130, 310 120 Q 360 105, 400 90" 
        stroke="#059669" stroke-width="2.5" fill="none"/>
  
  <!-- Lower bound g(x) -->
  <path d="M 60 260 Q 100 230, 140 200 Q 180 175, 225 140 Q 270 105, 310 85 Q 360 60, 400 50" 
        stroke="#7c3aed" stroke-width="2.5" fill="none"/>
  
  <!-- The squeezed function f(x) - oscillating between g and h -->
  <path d="M 60 255 Q 75 245, 90 250 Q 105 235, 120 240 Q 135 220, 150 225 
           Q 165 200, 180 195 Q 195 175, 210 165 Q 220 150, 225 140 
           Q 235 125, 250 118 Q 270 100, 290 95 Q 320 80, 350 72 Q 380 62, 400 58" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Point of convergence at (a, L) -->
  <circle cx="225" cy="140" r="6" fill="#f97316"/>
  
  <!-- Dashed lines to the point -->
  <line x1="225" y1="140" x2="225" y2="280" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="40" y1="140" x2="225" y2="140" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Function labels -->
  <text x="390" y="45" font-family="serif" font-size="13" font-style="italic" fill="#7c3aed">g(x)</text>
  <text x="390" y="105" font-family="serif" font-size="13" font-style="italic" fill="#059669">h(x)</text>
  <text x="370" y="75" font-family="serif" font-size="13" font-style="italic" fill="#2563eb">f(x)</text>
  
  <!-- Squeeze arrows -->
  <path d="M 140 155 L 155 162" stroke="#64748b" stroke-width="1.5" fill="none"/>
  <path d="M 140 225 L 155 210" stroke="#64748b" stroke-width="1.5" fill="none"/>
  <text x="115" y="195" font-family="sans-serif" font-size="11" fill="#64748b">squeeze!</text>
  
  <!-- Title/key theorem statement -->
  <text x="225" y="335" font-family="serif" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">
    The Squeeze Theorem
  </text>
  <text x="225" y="355" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    If g(x) ≤ f(x) ≤ h(x) near a, and lim g(x) = lim h(x) = L, then lim f(x) = L.
  </text>
  <text x="126" y="362" font-family="serif" font-size="9" fill="#1e293b">x→a</text>
  <text x="210" y="362" font-family="serif" font-size="9" fill="#1e293b">x→a</text>
  <text x="295" y="362" font-family="serif" font-size="9" fill="#1e293b">x→a</text>
</svg>
