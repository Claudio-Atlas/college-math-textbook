<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="420" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="390" y2="70"/>
    <line x1="50" y1="120" x2="390" y2="120"/>
    <line x1="50" y1="160" x2="390" y2="160"/>
    <line x1="50" y1="210" x2="390" y2="210"/>
    <line x1="50" y1="260" x2="390" y2="260"/>
  </g>
  
  <!-- Axes -->
  <line x1="30" y1="160" x2="400" y2="160" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="290" x2="200" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="405" y="165" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="195" y="22" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- VA at x = -2 (x = 100 in svg coords) -->
  <line x1="100" y1="30" x2="100" y2="290" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="90" y="285" font-family="serif" font-size="11" fill="#dc2626">x = −2</text>
  
  <!-- VA at x = 1 (x = 250 in svg coords, doubled from center) -->
  <line x1="250" y1="30" x2="250" y2="290" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="255" y="285" font-family="serif" font-size="11" fill="#dc2626">x = 1</text>
  
  <!-- Function f(x) = x/[(x-1)²(x+2)] -->
  <!-- Branch 1: x < -2 -->
  <path d="M 40 200 Q 60 180, 70 165 Q 80 150, 90 130 Q 95 100, 98 60" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Branch 2: -2 < x < 1 -->
  <path d="M 102 280 Q 110 220, 130 175 Q 150 145, 175 135 Q 200 130, 220 145 Q 235 160, 245 200 Q 248 250, 249 290" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Branch 3: x > 1 -->
  <path d="M 252 290 Q 255 200, 270 170 Q 290 140, 320 135 Q 360 130, 400 125" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- One-sided limit arrows/annotations -->
  <!-- At x = -2 -->
  <text x="55" y="55" font-family="serif" font-size="10" fill="#059669">+∞</text>
  <text x="105" y="280" font-family="serif" font-size="10" fill="#059669">−∞</text>
  
  <!-- At x = 1 (both sides go same direction due to squared) -->
  <text x="230" y="280" font-family="serif" font-size="10" fill="#059669">+∞</text>
  <text x="255" y="280" font-family="serif" font-size="10" fill="#059669">+∞</text>
  
  <!-- Function label -->
  <text x="300" y="55" font-family="serif" font-size="12" fill="#2563eb">f(x) = </text>
  <text x="345" y="50" font-family="serif" font-size="11" fill="#2563eb">x</text>
  <line x1="320" y1="53" x2="400" y2="53" stroke="#2563eb" stroke-width="1"/>
  <text x="325" y="68" font-family="serif" font-size="11" fill="#2563eb">(x−1)²(x+2)</text>
  
  <!-- Title -->
  <text x="200" y="305" font-family="serif" font-size="12" fill="#64748b" text-anchor="middle">
    Multiple vertical asymptotes with different behaviors
  </text>
</svg>
