<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="50" y1="250" x2="380" y2="250" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="260" x2="50" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="385" y="255" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="20" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Tick marks -->
  <line x1="150" y1="247" x2="150" y2="253" stroke="#1e293b" stroke-width="1.5"/>
  <text x="147" y="268" font-family="serif" font-size="13" fill="#1e293b">1</text>
  <line x1="47" y1="150" x2="53" y2="150" stroke="#1e293b" stroke-width="1.5"/>
  <text x="35" y="155" font-family="serif" font-size="13" fill="#1e293b">2</text>
  
  <!-- The line y = x + 1 (the function f(x) = (x²-1)/(x-1) = x+1 for x ≠ 1) -->
  <!-- At x=0, y=1 (pixel ~200); at x=1, y=2 (pixel 150); at x=3, y=4 (pixel ~50) -->
  <!-- Origin at (50, 250), scale: 100px per unit for x, 50px per unit for y -->
  <line x1="50" y1="200" x2="145" y2="152" stroke="#2563eb" stroke-width="3"/>
  <line x1="155" y1="148" x2="350" y2="50" stroke="#2563eb" stroke-width="3"/>
  
  <!-- Open circle (hole) at (1, 2) -->
  <circle cx="150" cy="150" r="6" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
  
  <!-- Dashed lines to show the limit -->
  <line x1="150" y1="150" x2="150" y2="250" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="50" y1="150" x2="150" y2="150" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Arrows approaching from left and right -->
  <path d="M 90 180 L 130 158" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 210 120 L 170 142" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Limit annotation -->
  <text x="225" y="90" font-family="serif" font-size="14" fill="#1e293b">lim</text>
  <text x="225" y="105" font-family="serif" font-size="10" fill="#1e293b">x→1</text>
  <text x="260" y="100" font-family="serif" font-size="14" fill="#1e293b">f(x) = 2</text>
  
  <!-- Function label -->
  <text x="280" y="50" font-family="serif" font-size="14" fill="#2563eb">f(x) = </text>
  <text x="330" y="43" font-family="serif" font-size="13" fill="#2563eb">x² − 1</text>
  <line x1="330" y1="48" x2="370" y2="48" stroke="#2563eb" stroke-width="1"/>
  <text x="338" y="62" font-family="serif" font-size="13" fill="#2563eb">x − 1</text>
  
  <!-- Note about undefined -->
  <text x="155" y="175" font-family="serif" font-size="11" fill="#64748b">undefined</text>
  <text x="165" y="188" font-family="serif" font-size="11" fill="#64748b">at x = 1</text>
  
  <!-- Explanation -->
  <text x="200" y="295" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    The limit exists even though f(1) is undefined.
  </text>
</svg>
