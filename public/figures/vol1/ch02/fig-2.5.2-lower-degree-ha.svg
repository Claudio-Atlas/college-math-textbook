<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="160" x2="370" y2="160"/>
    <line x1="50" y1="210" x2="370" y2="210"/>
    <line x1="50" y1="260" x2="370" y2="260"/>
  </g>
  
  <!-- Axes -->
  <line x1="30" y1="160" x2="385" y2="160" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="290" x2="200" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="390" y="165" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="195" y="22" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Horizontal asymptote at y = 0 -->
  <line x1="30" y1="160" x2="385" y2="160" stroke="#dc2626" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="350" y="175" font-family="serif" font-size="12" fill="#dc2626">y = 0</text>
  
  <!-- Function f(x) = (2x+5)/(x²-3) -->
  <!-- Left branch: x < -√3 ≈ -1.73 -->
  <path d="M 40 145 Q 80 150, 100 152 Q 120 154, 140 156 Q 155 157, 165 158" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Middle section with vertical asymptotes suggested -->
  <path d="M 175 280 Q 180 200, 190 170 Q 195 165, 200 160 Q 205 155, 210 150 Q 220 140, 225 60" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Right branch: x > √3 ≈ 1.73 -->
  <path d="M 235 162 Q 250 161, 280 160 Q 320 159, 370 159" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Approaching arrows on the right -->
  <text x="330" y="145" font-family="serif" font-size="11" fill="#059669">→ 0</text>
  
  <!-- Approaching arrows on the left -->
  <text x="55" y="140" font-family="serif" font-size="11" fill="#059669">→ 0</text>
  
  <!-- Function label -->
  <text x="280" y="70" font-family="serif" font-size="12" fill="#2563eb">f(x) = </text>
  <text x="330" y="65" font-family="serif" font-size="11" fill="#2563eb">2x + 5</text>
  <line x1="325" y1="68" x2="375" y2="68" stroke="#2563eb" stroke-width="1"/>
  <text x="332" y="82" font-family="serif" font-size="11" fill="#2563eb">x² − 3</text>
  
  <!-- Case explanation -->
  <rect x="30" y="250" width="340" height="55" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="45" y="270" font-family="serif" font-size="12" fill="#1e293b">
    Case: deg(numerator) &lt; deg(denominator)
  </text>
  <text x="45" y="290" font-family="serif" font-size="12" fill="#1e293b">
    Result: Horizontal asymptote at y = 0
  </text>
</svg>
