<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="340" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="40" y1="280" x2="380" y2="280" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="290" x2="200" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="385" y="285" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="205" y="25" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Origin -->
  <text x="205" y="295" font-family="serif" font-size="12" fill="#1e293b">0</text>
  
  <!-- Vertical asymptote at x = 0 (the y-axis itself) -->
  <!-- f(x) = 1/x² -->
  
  <!-- Left branch: x < 0, approaches +∞ as x → 0⁻ -->
  <path d="M 50 270 Q 80 268, 110 260 Q 140 245, 160 200 Q 175 140, 185 80 Q 190 55, 195 45" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Right branch: x > 0, approaches +∞ as x → 0⁺ -->
  <path d="M 205 45 Q 210 55, 215 80 Q 225 140, 240 200 Q 260 245, 290 260 Q 320 268, 370 270" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Vertical asymptote line (dashed) -->
  <line x1="200" y1="280" x2="200" y2="40" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  
  <!-- Arrows showing function going to infinity -->
  <path d="M 190 80 L 193 55" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 210 80 L 207 55" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- +∞ labels -->
  <text x="165" y="50" font-family="serif" font-size="14" fill="#f97316">+∞</text>
  <text x="215" y="50" font-family="serif" font-size="14" fill="#f97316">+∞</text>
  
  <!-- Function label -->
  <text x="300" y="220" font-family="serif" font-size="15" fill="#2563eb">f(x) = </text>
  <text x="350" y="213" font-family="serif" font-size="14" fill="#2563eb">1</text>
  <line x1="347" y1="218" x2="365" y2="218" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="232" font-family="serif" font-size="14" fill="#2563eb">x²</text>
  
  <!-- Asymptote label -->
  <text x="210" y="155" font-family="serif" font-size="11" fill="#dc2626">vertical</text>
  <text x="210" y="168" font-family="serif" font-size="11" fill="#dc2626">asymptote</text>
  <text x="215" y="181" font-family="serif" font-size="11" fill="#dc2626">x = 0</text>
  
  <!-- Limit annotation -->
  <text x="70" y="75" font-family="serif" font-size="13" fill="#1e293b">lim</text>
  <text x="60" y="90" font-family="serif" font-size="10" fill="#1e293b">x→0</text>
  <text x="95" y="82" font-family="serif" font-size="13" fill="#1e293b">f(x) = +∞</text>
  
  <!-- Explanation -->
  <text x="200" y="320" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    Both sides approach +∞, so the limit does not exist (unbounded).
  </text>
</svg>
