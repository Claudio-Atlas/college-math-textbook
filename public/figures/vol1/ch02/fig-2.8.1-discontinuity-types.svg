<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="560" height="280" fill="#ffffff"/>
  
  <!-- Dividing lines -->
  <line x1="186" y1="30" x2="186" y2="250" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="373" y1="30" x2="373" y2="250" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- PANEL A: Removable Discontinuity -->
  <text x="93" y="25" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">(a) Removable</text>
  
  <!-- Axes -->
  <line x1="20" y1="180" x2="170" y2="180" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="20" y1="190" x2="20" y2="50" stroke="#1e293b" stroke-width="1.5"/>
  
  <text x="175" y="185" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">x</text>
  <text x="15" y="45" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Line with hole -->
  <line x1="30" y1="160" x2="85" y2="105" stroke="#2563eb" stroke-width="2"/>
  <line x1="95" y1="97" x2="160" y2="45" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Hole -->
  <circle cx="90" cy="100" r="4" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  
  <!-- x = a tick -->
  <line x1="90" y1="178" x2="90" y2="182" stroke="#1e293b" stroke-width="1"/>
  <text x="87" y="195" font-family="serif" font-size="10" font-style="italic" fill="#1e293b">a</text>
  
  <!-- Caption -->
  <text x="93" y="215" font-family="serif" font-size="10" fill="#64748b" text-anchor="middle">Limit exists,</text>
  <text x="93" y="228" font-family="serif" font-size="10" fill="#64748b" text-anchor="middle">f(a) ≠ limit or undefined</text>
  
  <!-- PANEL B: Jump Discontinuity -->
  <text x="280" y="25" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">(b) Jump</text>
  
  <!-- Axes -->
  <line x1="207" y1="180" x2="357" y2="180" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="207" y1="190" x2="207" y2="50" stroke="#1e293b" stroke-width="1.5"/>
  
  <text x="362" y="185" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">x</text>
  <text x="202" y="45" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Left branch -->
  <path d="M 215 150 Q 240 135, 270 140" stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- Right branch (higher) -->
  <path d="M 280 85 Q 310 80, 345 75" stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- Open circles at jump -->
  <circle cx="277" cy="140" r="4" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="277" cy="85" r="4" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Filled dot showing f(a) -->
  <circle cx="277" cy="140" r="4" fill="#f97316"/>
  
  <!-- x = a tick -->
  <line x1="277" y1="178" x2="277" y2="182" stroke="#1e293b" stroke-width="1"/>
  <text x="274" y="195" font-family="serif" font-size="10" font-style="italic" fill="#1e293b">a</text>
  
  <!-- Caption -->
  <text x="280" y="215" font-family="serif" font-size="10" fill="#64748b" text-anchor="middle">One-sided limits exist</text>
  <text x="280" y="228" font-family="serif" font-size="10" fill="#64748b" text-anchor="middle">but are unequal</text>
  
  <!-- PANEL C: Infinite Discontinuity -->
  <text x="467" y="25" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">(c) Infinite</text>
  
  <!-- Axes -->
  <line x1="394" y1="180" x2="544" y2="180" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="394" y1="190" x2="394" y2="50" stroke="#1e293b" stroke-width="1.5"/>
  
  <text x="549" y="185" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">x</text>
  <text x="389" y="45" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Vertical asymptote -->
  <line x1="464" y1="50" x2="464" y2="180" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>
  
  <!-- Left branch going to -∞ -->
  <path d="M 404 170 Q 430 165, 450 150 Q 458 130, 461 100" stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- Right branch going to +∞ -->
  <path d="M 467 55 Q 470 80, 480 120 Q 500 155, 534 170" stroke="#2563eb" stroke-width="2" fill="none"/>
  
  <!-- x = a tick -->
  <line x1="464" y1="178" x2="464" y2="182" stroke="#1e293b" stroke-width="1"/>
  <text x="461" y="195" font-family="serif" font-size="10" font-style="italic" fill="#1e293b">a</text>
  
  <!-- Caption -->
  <text x="467" y="215" font-family="serif" font-size="10" fill="#64748b" text-anchor="middle">Function approaches</text>
  <text x="467" y="228" font-family="serif" font-size="10" fill="#64748b" text-anchor="middle">±∞ near x = a</text>
  
  <!-- Bottom title -->
  <text x="280" y="260" font-family="sans-serif" font-size="12" fill="#1e293b" text-anchor="middle" font-weight="bold">
    Three Types of Discontinuity
  </text>
</svg>
