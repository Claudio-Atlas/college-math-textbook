<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" width="420" height="340">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="340" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="40" y1="170" x2="400" y2="170" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="210" y1="310" x2="210" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="405" y="175" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="215" y="25" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Origin -->
  <text x="215" y="185" font-family="serif" font-size="12" fill="#1e293b">0</text>
  
  <!-- Upper bound y = x² (parabola opening upward from origin) -->
  <!-- Scale: let's use 100 pixels per unit on x-axis, make parabola visible -->
  <path d="M 60 145 Q 100 160, 140 167 Q 170 169, 210 170 Q 250 169, 280 167 Q 320 160, 360 145" 
        stroke="#059669" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  
  <!-- Lower bound y = -x² (parabola opening downward from origin) -->
  <path d="M 60 195 Q 100 180, 140 173 Q 170 171, 210 170 Q 250 171, 280 173 Q 320 180, 360 195" 
        stroke="#7c3aed" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  
  <!-- f(x) = x² sin(1/x) - oscillating wildly near origin but squeezed -->
  <path d="M 60 170 Q 65 155, 70 160 Q 75 175, 80 165 Q 85 180, 90 168 Q 95 177, 100 169 
           Q 105 175, 110 168 Q 115 173, 120 169 Q 130 172, 140 170 
           Q 150 171, 160 169 Q 170 170, 180 170 Q 190 170, 200 170 
           Q 210 170, 220 170 Q 230 170, 240 169 Q 250 171, 260 170 
           Q 280 169, 300 168 Q 310 172, 320 169 Q 325 175, 330 168 
           Q 335 178, 340 165 Q 345 180, 350 160 Q 355 175, 360 155" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Point at origin where they all meet -->
  <circle cx="210" cy="170" r="5" fill="#f97316"/>
  
  <!-- Function labels -->
  <text x="365" y="140" font-family="serif" font-size="12" fill="#059669">y = x²</text>
  <text x="365" y="205" font-family="serif" font-size="12" fill="#7c3aed">y = −x²</text>
  
  <!-- Main function label -->
  <text x="80" y="60" font-family="serif" font-size="14" fill="#2563eb">f(x) = x² sin</text>
  <text x="175" y="55" font-family="serif" font-size="12" fill="#2563eb">(</text>
  <text x="182" y="52" font-family="serif" font-size="11" fill="#2563eb">1</text>
  <line x1="180" y1="56" x2="192" y2="56" stroke="#2563eb" stroke-width="1"/>
  <text x="182" y="68" font-family="serif" font-size="11" fill="#2563eb">x</text>
  <text x="195" y="55" font-family="serif" font-size="12" fill="#2563eb">)</text>
  
  <!-- Squeeze annotation -->
  <text x="300" y="125" font-family="serif" font-size="11" fill="#64748b">−x² ≤ f(x) ≤ x²</text>
  
  <!-- Arrow pointing to the pinch point -->
  <path d="M 170 220 Q 185 205, 200 185" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="130" y="235" font-family="serif" font-size="11" fill="#f97316">pinch point</text>
  <text x="135" y="250" font-family="serif" font-size="11" fill="#f97316">at x = 0</text>
  
  <!-- Limit result -->
  <text x="210" y="295" font-family="serif" font-size="13" fill="#1e293b" text-anchor="middle">
    lim x² sin(1/x) = 0
  </text>
  <text x="160" y="302" font-family="serif" font-size="9" fill="#1e293b">x→0</text>
  
  <text x="210" y="315" font-family="serif" font-size="11" fill="#64748b" text-anchor="middle">
    by the Squeeze Theorem (both bounds → 0)
  </text>
</svg>
