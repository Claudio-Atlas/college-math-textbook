<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="170" x2="370" y2="170"/>
    <line x1="50" y1="220" x2="370" y2="220"/>
  </g>
  
  <!-- Axes -->
  <line x1="50" y1="220" x2="380" y2="220" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="280" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="385" y="225" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="30" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Function f(x) = (√(x+9) - 3)/x approaching y = 1/6 ≈ 0.167 -->
  <!-- Left branch (x < 0) -->
  <path d="M 60 130 Q 100 135, 140 142 Q 180 150, 220 157" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Right branch (x > 0) -->
  <path d="M 260 163 Q 300 170, 340 175 Q 370 178, 380 180" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Hole at x = 0, y = 1/6 -->
  <circle cx="240" cy="160" r="5" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  
  <!-- Horizontal dashed line at y = 1/6 -->
  <line x1="50" y1="160" x2="380" y2="160" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- y = 1/6 label -->
  <text x="15" y="165" font-family="serif" font-size="12" fill="#059669">y = 1/6</text>
  
  <!-- x = 0 label -->
  <text x="235" y="238" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">0</text>
  
  <!-- Vertical dashed line at x = 0 -->
  <line x1="240" y1="220" x2="240" y2="100" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Curve label -->
  <text x="280" y="85" font-family="serif" font-size="13" fill="#2563eb">f(x) = </text>
  <text x="325" y="80" font-family="serif" font-size="12" fill="#2563eb">√(x+9) − 3</text>
  <line x1="325" y1="83" x2="385" y2="83" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="97" font-family="serif" font-size="12" fill="#2563eb">x</text>
  
  <!-- Limit annotation -->
  <text x="70" y="290" font-family="serif" font-size="13" fill="#1e293b">
    lim f(x) = 1/6  (by rationalizing the numerator)
  </text>
  <text x="70" y="305" font-family="serif" font-size="12" fill="#1e293b">x→0</text>
  
  <!-- Arrow pointing to hole -->
  <path d="M 200 130 Q 210 140, 235 155" stroke="#f97316" stroke-width="1.5" fill="none"/>
  <text x="150" y="125" font-family="serif" font-size="11" fill="#f97316">limit exists</text>
  <text x="150" y="138" font-family="serif" font-size="11" fill="#f97316">at x = 0</text>
</svg>
