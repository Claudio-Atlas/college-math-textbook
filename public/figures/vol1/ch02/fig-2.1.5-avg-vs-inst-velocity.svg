<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="420" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="320" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="50" y1="250" x2="390" y2="250" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="260" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="385" y="270" font-family="serif" font-size="14" fill="#1e293b">t</text>
  <text x="35" y="35" font-family="serif" font-size="14" fill="#1e293b">s(t)</text>
  
  <!-- Position curve -->
  <path d="M 70 220 Q 120 200, 160 150 Q 200 100, 250 80 Q 300 70, 350 75" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Point P at t = t₀ -->
  <circle cx="160" cy="150" r="5" fill="#f97316"/>
  
  <!-- Point Q at t = t₁ -->
  <circle cx="280" cy="72" r="5" fill="#64748b"/>
  
  <!-- Secant line (average velocity) -->
  <line x1="100" y1="180" x2="340" y2="52" stroke="#64748b" stroke-width="2"/>
  
  <!-- Tangent line (instantaneous velocity) -->
  <line x1="80" y1="210" x2="280" y2="80" stroke="#dc2626" stroke-width="2"/>
  
  <!-- Labels for points -->
  <text x="145" y="170" font-family="serif" font-size="12" fill="#f97316">P(t₀, s(t₀))</text>
  <text x="285" y="65" font-family="serif" font-size="12" fill="#64748b">Q(t₁, s(t₁))</text>
  
  <!-- Dashed lines to axes -->
  <line x1="160" y1="150" x2="160" y2="250" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="72" x2="280" y2="250" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Tick marks -->
  <line x1="160" y1="247" x2="160" y2="253" stroke="#1e293b" stroke-width="1"/>
  <text x="155" y="268" font-family="serif" font-size="11" fill="#1e293b">t₀</text>
  <line x1="280" y1="247" x2="280" y2="253" stroke="#1e293b" stroke-width="1"/>
  <text x="275" y="268" font-family="serif" font-size="11" fill="#1e293b">t₁</text>
  
  <!-- Legend -->
  <line x1="60" y1="285" x2="90" y2="285" stroke="#64748b" stroke-width="2"/>
  <text x="95" y="290" font-family="serif" font-size="11" fill="#64748b">Secant: average velocity = Δs/Δt</text>
  
  <line x1="60" y1="302" x2="90" y2="302" stroke="#dc2626" stroke-width="2"/>
  <text x="95" y="307" font-family="serif" font-size="11" fill="#dc2626">Tangent: instantaneous velocity at t₀</text>
  
  <!-- Curve label -->
  <text x="340" y="90" font-family="serif" font-size="13" font-style="italic" fill="#2563eb">s = s(t)</text>
</svg>
