<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="170" x2="370" y2="170"/>
    <line x1="50" y1="220" x2="370" y2="220"/>
  </g>
  
  <!-- Axes -->
  <line x1="50" y1="220" x2="385" y2="220" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="280" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="390" y="225" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="32" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Left piece of function (approaching from left) -->
  <path d="M 60 200 Q 100 180, 140 150 Q 170 125, 198 100" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Right piece of function -->
  <path d="M 202 180 Q 240 175, 280 165 Q 320 155, 370 140" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Open circle at left limit -->
  <circle cx="200" cy="100" r="5" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  
  <!-- Filled circle at actual value (on right piece) -->
  <circle cx="200" cy="180" r="5" fill="#dc2626"/>
  
  <!-- x = a label -->
  <line x1="200" y1="217" x2="200" y2="223" stroke="#1e293b" stroke-width="1.5"/>
  <text x="195" y="238" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">a</text>
  
  <!-- Dashed vertical line showing the jump -->
  <line x1="200" y1="100" x2="200" y2="180" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- L₁ label (left limit) -->
  <line x1="47" y1="100" x2="53" y2="100" stroke="#1e293b" stroke-width="1.5"/>
  <text x="25" y="105" font-family="serif" font-size="11" fill="#1e293b">L⁻</text>
  
  <!-- L₂ label (right limit / actual value) -->
  <line x1="47" y1="180" x2="53" y2="180" stroke="#1e293b" stroke-width="1.5"/>
  <text x="25" y="185" font-family="serif" font-size="11" fill="#1e293b">L⁺</text>
  
  <!-- Jump annotation -->
  <path d="M 215 105 L 215 175" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 215 175 L 215 105" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="225" y="145" font-family="serif" font-size="11" fill="#dc2626">jump</text>
  
  <!-- Limit annotations -->
  <text x="100" y="80" font-family="serif" font-size="10" fill="#059669">lim f(x) = L⁻</text>
  <text x="100" y="93" font-family="serif" font-size="9" fill="#059669">x→a⁻</text>
  
  <text x="270" y="200" font-family="serif" font-size="10" fill="#059669">lim f(x) = L⁺</text>
  <text x="270" y="213" font-family="serif" font-size="9" fill="#059669">x→a⁺</text>
  
  <!-- Description box -->
  <rect x="50" y="255" width="320" height="55" fill="#fee2e2" stroke="#dc2626" stroke-width="1" rx="4"/>
  <text x="65" y="275" font-family="serif" font-size="11" fill="#991b1b">
    Jump Discontinuity: Both one-sided limits exist,
  </text>
  <text x="65" y="292" font-family="serif" font-size="11" fill="#991b1b">
    but L⁻ ≠ L⁺ (the two-sided limit does not exist).
  </text>
</svg>
