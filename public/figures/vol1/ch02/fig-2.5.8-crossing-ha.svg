<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="160" x2="370" y2="160"/>
    <line x1="50" y1="210" x2="370" y2="210"/>
    <line x1="50" y1="260" x2="370" y2="260"/>
  </g>
  
  <!-- Axes -->
  <line x1="30" y1="160" x2="385" y2="160" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="290" x2="200" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="390" y="165" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="195" y="22" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Horizontal asymptote at y = 1 (y = 120 in svg) -->
  <line x1="30" y1="120" x2="385" y2="120" stroke="#dc2626" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="15" y="125" font-family="serif" font-size="12" fill="#dc2626">y = 1</text>
  
  <!-- Function f(x) = sin(x)/x + 1 - oscillates and crosses y=1 repeatedly -->
  <!-- Damped oscillation around y = 1 -->
  <path d="M 40 120 
           Q 60 80, 80 120 
           Q 100 150, 120 120 
           Q 140 95, 160 120 
           Q 180 140, 200 120 
           Q 220 105, 240 120 
           Q 260 132, 280 120 
           Q 300 110, 320 120 
           Q 340 127, 360 120 
           Q 375 115, 385 120" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Crossing points highlighted -->
  <circle cx="80" cy="120" r="4" fill="#f97316"/>
  <circle cx="120" cy="120" r="4" fill="#f97316"/>
  <circle cx="160" cy="120" r="4" fill="#f97316"/>
  <circle cx="200" cy="120" r="4" fill="#f97316"/>
  <circle cx="240" cy="120" r="4" fill="#f97316"/>
  <circle cx="280" cy="120" r="4" fill="#f97316"/>
  <circle cx="320" cy="120" r="4" fill="#f97316"/>
  <circle cx="360" cy="120" r="4" fill="#f97316"/>
  
  <!-- Annotation for crossings -->
  <text x="250" y="75" font-family="serif" font-size="11" fill="#f97316">Function crosses HA</text>
  <text x="250" y="90" font-family="serif" font-size="11" fill="#f97316">infinitely many times!</text>
  
  <!-- Function label -->
  <text x="55" y="220" font-family="serif" font-size="12" fill="#2563eb">f(x) = </text>
  <text x="105" y="215" font-family="serif" font-size="11" fill="#2563eb">sin x</text>
  <line x1="100" y1="218" x2="140" y2="218" stroke="#2563eb" stroke-width="1"/>
  <text x="115" y="232" font-family="serif" font-size="11" fill="#2563eb">x</text>
  <text x="145" y="220" font-family="serif" font-size="12" fill="#2563eb">+ 1</text>
  
  <!-- Key insight box -->
  <rect x="30" y="255" width="340" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="4"/>
  <text x="45" y="275" font-family="serif" font-size="11" fill="#92400e">
    ⚠ Common Misconception: A function CAN cross its
  </text>
  <text x="45" y="292" font-family="serif" font-size="11" fill="#92400e">
    horizontal asymptote! The HA describes end behavior only.
  </text>
</svg>
