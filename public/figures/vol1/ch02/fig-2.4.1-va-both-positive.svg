<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" width="420" height="340">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="420" height="340" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="40" y1="250" x2="400" y2="250" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="40" y1="260" x2="40" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="405" y="255" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="35" y="20" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- x-axis tick at x = 3 (pixel 220) -->
  <line x1="220" y1="247" x2="220" y2="253" stroke="#1e293b" stroke-width="1.5"/>
  <text x="217" y="268" font-family="serif" font-size="13" fill="#1e293b">3</text>
  
  <!-- Vertical asymptote at x = 3 -->
  <line x1="220" y1="250" x2="220" y2="40" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- f(x) = 1/(x-3)² -->
  <!-- Left branch: as x→3⁻, f(x)→+∞ -->
  <path d="M 50 245 Q 80 244, 110 242 Q 140 238, 165 225 Q 185 200, 200 150 Q 210 100, 215 55" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Right branch: as x→3⁺, f(x)→+∞ -->
  <path d="M 225 55 Q 230 100, 240 150 Q 255 200, 275 225 Q 300 238, 330 242 Q 360 244, 390 245" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Horizontal asymptote at y = 0 -->
  <line x1="40" y1="250" x2="400" y2="250" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Arrows showing approach to +∞ -->
  <path d="M 210 85 L 213 55" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 230 85 L 227 55" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- +∞ labels -->
  <text x="180" y="50" font-family="serif" font-size="14" fill="#f97316">+∞</text>
  <text x="232" y="50" font-family="serif" font-size="14" fill="#f97316">+∞</text>
  
  <!-- Function label -->
  <text x="300" y="160" font-family="serif" font-size="15" fill="#2563eb">f(x) = </text>
  <text x="355" y="148" font-family="serif" font-size="14" fill="#2563eb">1</text>
  <line x1="345" y1="153" x2="395" y2="153" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="168" font-family="serif" font-size="14" fill="#2563eb">(x−3)²</text>
  
  <!-- Asymptote label -->
  <text x="230" y="120" font-family="serif" font-size="12" fill="#dc2626">VA: x = 3</text>
  
  <!-- Limit annotations -->
  <text x="100" y="75" font-family="serif" font-size="12" fill="#1e293b">lim f(x) = +∞</text>
  <text x="100" y="60" font-family="serif" font-size="10" fill="#1e293b">x→3⁻</text>
  
  <text x="100" y="105" font-family="serif" font-size="12" fill="#1e293b">lim f(x) = +∞</text>
  <text x="100" y="90" font-family="serif" font-size="10" fill="#1e293b">x→3⁺</text>
  
  <!-- Explanation -->
  <text x="210" y="300" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    Even power in denominator: both sides go to +∞
  </text>
  <text x="210" y="320" font-family="serif" font-size="12" fill="#64748b" text-anchor="middle">
    (same sign from both directions)
  </text>
</svg>
