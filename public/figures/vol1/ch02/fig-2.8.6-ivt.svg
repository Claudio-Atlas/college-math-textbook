<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 380" width="450" height="380">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="450" height="380" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="50" y1="300" x2="420" y2="300" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="310" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="425" y="305" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="30" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Horizontal line y = N -->
  <line x1="50" y1="160" x2="400" y2="160" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="35" y="165" font-family="serif" font-size="14" font-weight="bold" fill="#dc2626">N</text>
  
  <!-- x-axis ticks -->
  <line x1="120" y1="297" x2="120" y2="303" stroke="#1e293b" stroke-width="1.5"/>
  <text x="115" y="318" font-family="serif" font-size="13" font-style="italic" fill="#1e293b">a</text>
  
  <line x1="260" y1="297" x2="260" y2="303" stroke="#1e293b" stroke-width="1.5"/>
  <text x="255" y="318" font-family="serif" font-size="13" font-style="italic" fill="#f97316">c</text>
  
  <line x1="370" y1="297" x2="370" y2="303" stroke="#1e293b" stroke-width="1.5"/>
  <text x="365" y="318" font-family="serif" font-size="13" font-style="italic" fill="#1e293b">b</text>
  
  <!-- y-axis ticks for f(a) and f(b) -->
  <line x1="47" y1="240" x2="53" y2="240" stroke="#1e293b" stroke-width="1.5"/>
  <text x="25" y="245" font-family="serif" font-size="12" fill="#1e293b">f(a)</text>
  
  <line x1="47" y1="80" x2="53" y2="80" stroke="#1e293b" stroke-width="1.5"/>
  <text x="25" y="85" font-family="serif" font-size="12" fill="#1e293b">f(b)</text>
  
  <!-- Continuous curve from (a, f(a)) to (b, f(b)) -->
  <path d="M 120 240 Q 150 230, 180 200 Q 210 170, 260 160 Q 310 150, 340 110 Q 355 95, 370 80" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Points at endpoints -->
  <circle cx="120" cy="240" r="5" fill="#2563eb"/>
  <circle cx="370" cy="80" r="5" fill="#2563eb"/>
  
  <!-- Point where curve crosses N -->
  <circle cx="260" cy="160" r="6" fill="#f97316"/>
  
  <!-- Dashed lines from c to axes -->
  <line x1="260" y1="160" x2="260" y2="300" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="50" y1="160" x2="260" y2="160" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Dashed lines from endpoints to axes -->
  <line x1="120" y1="240" x2="50" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="370" y1="80" x2="50" y2="80" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Annotation for the crossing point -->
  <text x="275" y="145" font-family="serif" font-size="12" fill="#f97316">f(c) = N</text>
  
  <!-- Function label -->
  <text x="340" y="65" font-family="serif" font-size="14" font-style="italic" fill="#2563eb">y = f(x)</text>
  
  <!-- Annotations showing f(a) < N < f(b) -->
  <text x="80" y="225" font-family="serif" font-size="11" fill="#64748b">f(a) &lt; N</text>
  <text x="380" y="95" font-family="serif" font-size="11" fill="#64748b">f(b) &gt; N</text>
  
  <!-- Theorem statement at bottom -->
  <text x="225" y="345" font-family="serif" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="bold">
    Intermediate Value Theorem
  </text>
  <text x="225" y="365" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    If f is continuous on [a, b] and N is between f(a) and f(b),
  </text>
  <text x="225" y="382" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    then there exists c ∈ (a, b) such that f(c) = N.
  </text>
</svg>
