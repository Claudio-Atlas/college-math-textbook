<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="340" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="250"/>
    <line x1="100" y1="50" x2="100" y2="250"/>
    <line x1="150" y1="50" x2="150" y2="250"/>
    <line x1="200" y1="50" x2="200" y2="250"/>
    <line x1="250" y1="50" x2="250" y2="250"/>
    <line x1="300" y1="50" x2="300" y2="250"/>
    <line x1="350" y1="50" x2="350" y2="250"/>
    <line x1="50" y1="80" x2="370" y2="80"/>
    <line x1="50" y1="130" x2="370" y2="130"/>
    <line x1="50" y1="165" x2="370" y2="165"/>
    <line x1="50" y1="200" x2="370" y2="200"/>
  </g>
  
  <!-- Axes -->
  <line x1="50" y1="165" x2="385" y2="165" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="270" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="390" y="170" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="32" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- y = 0 line (x-axis is already there) -->
  <text x="38" y="170" font-family="serif" font-size="11" fill="#1e293b">0</text>
  
  <!-- Function f(x) = x³ + x - 1 -->
  <path d="M 50 230 Q 100 200, 150 180 Q 180 168, 200 160 Q 230 145, 270 110 Q 320 60, 370 30" 
        stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Root (where curve crosses x-axis) - approximately x ≈ 0.68 -->
  <circle cx="216" cy="165" r="5" fill="#059669"/>
  
  <!-- x = 0 marker -->
  <line x1="100" y1="162" x2="100" y2="168" stroke="#1e293b" stroke-width="1.5"/>
  <text x="95" y="180" font-family="serif" font-size="11" fill="#1e293b">0</text>
  
  <!-- x = 1 marker -->
  <line x1="300" y1="162" x2="300" y2="168" stroke="#1e293b" stroke-width="1.5"/>
  <text x="295" y="180" font-family="serif" font-size="11" fill="#1e293b">1</text>
  
  <!-- f(0) = -1 point -->
  <circle cx="100" cy="195" r="4" fill="#dc2626"/>
  <text x="60" y="200" font-family="serif" font-size="10" fill="#dc2626">f(0) = −1</text>
  
  <!-- f(1) = 1 point -->
  <circle cx="300" cy="135" r="4" fill="#dc2626"/>
  <text x="305" y="130" font-family="serif" font-size="10" fill="#dc2626">f(1) = 1</text>
  
  <!-- Bisection intervals shown -->
  <!-- First bisection at x = 0.5 -->
  <line x1="200" y1="155" x2="200" y2="175" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="193" y="188" font-family="serif" font-size="9" fill="#f59e0b">0.5</text>
  
  <!-- f(0.5) < 0 indicator -->
  <circle cx="200" cy="169" r="3" fill="#f59e0b"/>
  
  <!-- Narrowing bracket -->
  <line x1="200" y1="205" x2="300" y2="205" stroke="#059669" stroke-width="2"/>
  <line x1="200" y1="200" x2="200" y2="210" stroke="#059669" stroke-width="2"/>
  <line x1="300" y1="200" x2="300" y2="210" stroke="#059669" stroke-width="2"/>
  <text x="235" y="220" font-family="serif" font-size="10" fill="#059669">narrowed interval</text>
  
  <!-- Root label -->
  <text x="225" y="155" font-family="serif" font-size="11" fill="#059669">root ≈ 0.68</text>
  
  <!-- Function label -->
  <text x="280" y="55" font-family="serif" font-size="12" fill="#2563eb">f(x) = x³ + x − 1</text>
  
  <!-- IVT explanation -->
  <rect x="50" y="240" width="320" height="90" fill="#ecfdf5" stroke="#059669" stroke-width="1" rx="4"/>
  <text x="65" y="260" font-family="serif" font-size="11" fill="#065f46" font-weight="bold">
    Bisection Method (using IVT):
  </text>
  <text x="65" y="278" font-family="serif" font-size="10" fill="#065f46">
    1. f(0) = −1 &lt; 0 and f(1) = 1 &gt; 0 ⟹ root in [0, 1]
  </text>
  <text x="65" y="293" font-family="serif" font-size="10" fill="#065f46">
    2. Check midpoint: f(0.5) = −0.375 &lt; 0 ⟹ root in [0.5, 1]
  </text>
  <text x="65" y="308" font-family="serif" font-size="10" fill="#065f46">
    3. Continue bisecting to approximate the root...
  </text>
  <text x="65" y="323" font-family="serif" font-size="10" fill="#065f46">
    Root ≈ 0.6823... (real root of x³ + x − 1 = 0)
  </text>
</svg>
