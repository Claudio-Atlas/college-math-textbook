<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="170" x2="370" y2="170"/>
    <line x1="50" y1="220" x2="370" y2="220"/>
  </g>
  
  <!-- Axes -->
  <line x1="50" y1="170" x2="380" y2="170" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="290" x2="200" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="385" y="175" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="195" y="30" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Cubic curve y = x³ - 3x (shifted for visualization) -->
  <path d="M 70 250 Q 100 220, 130 170 Q 145 140, 170 120 Q 200 95, 230 90 Q 270 85, 300 120 Q 330 155, 360 260" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Tangent point P at inflection area -->
  <circle cx="170" cy="120" r="5" fill="#f97316"/>
  <text x="155" y="110" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">P</text>
  
  <!-- Tangent line that crosses the curve at another point -->
  <line x1="70" y1="175" x2="360" y2="75" stroke="#64748b" stroke-width="2"/>
  
  <!-- Second intersection point Q -->
  <circle cx="300" cy="100" r="5" fill="#dc2626"/>
  <text x="310" y="95" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">Q</text>
  
  <!-- Annotations -->
  <text x="80" y="50" font-family="serif" font-size="12" fill="#64748b">Tangent at P</text>
  <text x="80" y="66" font-family="serif" font-size="12" fill="#64748b">crosses curve at Q</text>
  
  <!-- Curve label -->
  <text x="340" y="280" font-family="serif" font-size="14" font-style="italic" fill="#2563eb">y = f(x)</text>
  
  <!-- Warning note -->
  <text x="200" y="300" font-family="serif" font-size="11" fill="#dc2626" text-anchor="middle">
    "Touching once" definition fails for general curves
  </text>
</svg>
