<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 320" width="450" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="450" height="320" fill="#ffffff"/>
  
  <!-- Panel 1: f(x) -->
  <g transform="translate(0, 0)">
    <!-- Axes -->
    <line x1="30" y1="140" x2="140" y2="140" stroke="#1e293b" stroke-width="1.5"/>
    <line x1="30" y1="150" x2="30" y2="30" stroke="#1e293b" stroke-width="1.5"/>
    
    <!-- f(x) curve -->
    <path d="M 35 120 Q 60 80, 85 70 Q 110 60, 135 50" stroke="#2563eb" stroke-width="2.5" fill="none"/>
    
    <!-- Limit L -->
    <line x1="27" y1="65" x2="33" y2="65" stroke="#f97316" stroke-width="2"/>
    <text x="12" y="70" font-family="serif" font-size="11" fill="#f97316">L</text>
    
    <!-- x = a marker -->
    <line x1="85" y1="140" x2="85" y2="70" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="82" y="152" font-family="serif" font-size="10" font-style="italic" fill="#1e293b">a</text>
    
    <!-- Label -->
    <text x="85" y="20" font-family="serif" font-size="12" fill="#2563eb" text-anchor="middle">f(x) → L</text>
  </g>
  
  <!-- Plus sign -->
  <text x="155" y="90" font-family="serif" font-size="24" fill="#1e293b">+</text>
  
  <!-- Panel 2: g(x) -->
  <g transform="translate(150, 0)">
    <!-- Axes -->
    <line x1="30" y1="140" x2="140" y2="140" stroke="#1e293b" stroke-width="1.5"/>
    <line x1="30" y1="150" x2="30" y2="30" stroke="#1e293b" stroke-width="1.5"/>
    
    <!-- g(x) curve -->
    <path d="M 35 130 Q 60 110, 85 95 Q 110 80, 135 70" stroke="#059669" stroke-width="2.5" fill="none"/>
    
    <!-- Limit M -->
    <line x1="27" y1="95" x2="33" y2="95" stroke="#f97316" stroke-width="2"/>
    <text x="10" y="100" font-family="serif" font-size="11" fill="#f97316">M</text>
    
    <!-- x = a marker -->
    <line x1="85" y1="140" x2="85" y2="95" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="82" y="152" font-family="serif" font-size="10" font-style="italic" fill="#1e293b">a</text>
    
    <!-- Label -->
    <text x="85" y="20" font-family="serif" font-size="12" fill="#059669" text-anchor="middle">g(x) → M</text>
  </g>
  
  <!-- Equals sign -->
  <text x="305" y="90" font-family="serif" font-size="24" fill="#1e293b">=</text>
  
  <!-- Panel 3: f(x) + g(x) -->
  <g transform="translate(300, 0)">
    <!-- Axes -->
    <line x1="30" y1="140" x2="140" y2="140" stroke="#1e293b" stroke-width="1.5"/>
    <line x1="30" y1="150" x2="30" y2="30" stroke="#1e293b" stroke-width="1.5"/>
    
    <!-- f(x) + g(x) curve -->
    <path d="M 35 110 Q 60 70, 85 50 Q 110 35, 135 25" stroke="#9333ea" stroke-width="2.5" fill="none"/>
    
    <!-- Limit L + M -->
    <line x1="27" y1="50" x2="33" y2="50" stroke="#f97316" stroke-width="2"/>
    <text x="0" y="55" font-family="serif" font-size="11" fill="#f97316">L+M</text>
    
    <!-- x = a marker -->
    <line x1="85" y1="140" x2="85" y2="50" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="82" y="152" font-family="serif" font-size="10" font-style="italic" fill="#1e293b">a</text>
    
    <!-- Label -->
    <text x="85" y="20" font-family="serif" font-size="12" fill="#9333ea" text-anchor="middle">[f+g](x) → L+M</text>
  </g>
  
  <!-- Sum Law statement -->
  <rect x="20" y="175" width="410" height="50" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="5"/>
  <text x="225" y="198" font-family="serif" font-size="14" fill="#1e293b" text-anchor="middle">
    Sum Law: lim [f(x) + g(x)] = lim f(x) + lim g(x)
  </text>
  <text x="225" y="215" font-family="serif" font-size="14" fill="#1e293b" text-anchor="middle">
    x→a                         x→a         x→a
  </text>
  
  <!-- Bottom note -->
  <text x="225" y="250" font-family="serif" font-size="12" fill="#64748b" text-anchor="middle">
    If both limits exist, the limit of the sum equals the sum of the limits.
  </text>
</svg>
