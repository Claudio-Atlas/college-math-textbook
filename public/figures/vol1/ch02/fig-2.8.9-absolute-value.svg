<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="250"/>
    <line x1="100" y1="50" x2="100" y2="250"/>
    <line x1="150" y1="50" x2="150" y2="250"/>
    <line x1="200" y1="50" x2="200" y2="250"/>
    <line x1="250" y1="50" x2="250" y2="250"/>
    <line x1="300" y1="50" x2="300" y2="250"/>
    <line x1="350" y1="50" x2="350" y2="250"/>
    <line x1="50" y1="100" x2="370" y2="100"/>
    <line x1="50" y1="150" x2="370" y2="150"/>
    <line x1="50" y1="200" x2="370" y2="200"/>
  </g>
  
  <!-- Axes -->
  <line x1="30" y1="200" x2="385" y2="200" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="270" x2="200" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="390" y="205" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="195" y="32" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Origin -->
  <text x="205" y="215" font-family="serif" font-size="11" fill="#1e293b">0</text>
  
  <!-- y = |x| - the V shape -->
  <!-- Left arm: y = -x for x < 0 -->
  <path d="M 50 50 L 200 200" stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Right arm: y = x for x >= 0 -->
  <path d="M 200 200 L 350 50" stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Corner point at origin -->
  <circle cx="200" cy="200" r="5" fill="#f97316"/>
  
  <!-- Corner annotation -->
  <text x="210" y="218" font-family="serif" font-size="11" fill="#f97316">corner at x = 0</text>
  
  <!-- Left slope annotation -->
  <text x="90" y="100" font-family="serif" font-size="12" fill="#059669">slope = −1</text>
  
  <!-- Right slope annotation -->
  <text x="280" y="100" font-family="serif" font-size="12" fill="#059669">slope = +1</text>
  
  <!-- Tangent line attempts (to show non-differentiability) -->
  <!-- Attempted tangent from left -->
  <line x1="130" y1="250" x2="270" y2="110" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Attempted tangent from right -->
  <line x1="130" y1="110" x2="270" y2="250" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Annotation about tangents -->
  <text x="280" y="170" font-family="serif" font-size="10" fill="#dc2626">Different tangent</text>
  <text x="280" y="183" font-family="serif" font-size="10" fill="#dc2626">slopes from left/right!</text>
  
  <!-- Function label -->
  <text x="320" y="55" font-family="serif" font-size="14" fill="#2563eb">f(x) = |x|</text>
  
  <!-- Key insight boxes -->
  <rect x="40" y="245" width="150" height="35" fill="#ecfdf5" stroke="#059669" stroke-width="1" rx="4"/>
  <text x="50" y="262" font-family="serif" font-size="11" fill="#065f46" font-weight="bold">✓ Continuous</text>
  <text x="50" y="276" font-family="serif" font-size="10" fill="#065f46">at x = 0 (and everywhere)</text>
  
  <rect x="210" y="245" width="150" height="35" fill="#fee2e2" stroke="#dc2626" stroke-width="1" rx="4"/>
  <text x="220" y="262" font-family="serif" font-size="11" fill="#991b1b" font-weight="bold">✗ Not Differentiable</text>
  <text x="220" y="276" font-family="serif" font-size="10" fill="#991b1b">at x = 0 (corner/cusp)</text>
  
  <!-- Preview note -->
  <text x="200" y="305" font-family="serif" font-size="11" fill="#64748b" text-anchor="middle">
    (Preview of Chapter 3: Continuous ≠ Differentiable)
  </text>
</svg>
