<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="40" y1="160" x2="380" y2="160" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="300" x2="200" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="385" y="165" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="205" y="25" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Origin -->
  <text x="205" y="175" font-family="serif" font-size="12" fill="#1e293b">0</text>
  
  <!-- Vertical asymptote -->
  <line x1="200" y1="30" x2="200" y2="290" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  
  <!-- Horizontal asymptote y = 0 -->
  <line x1="40" y1="160" x2="380" y2="160" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- f(x) = 1/x -->
  <!-- Right branch (x > 0): approaching +∞ as x→0⁺, approaching 0 as x→+∞ -->
  <path d="M 210 40 Q 215 60, 225 100 Q 245 140, 280 152 Q 320 157, 370 159" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Left branch (x < 0): approaching -∞ as x→0⁻, approaching 0 as x→-∞ -->
  <path d="M 50 161 Q 100 163, 140 168 Q 170 180, 185 220 Q 193 260, 195 290" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Arrows showing limits -->
  <path d="M 207 55 L 203 40" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="215" y="50" font-family="serif" font-size="12" fill="#f97316">+∞</text>
  
  <path d="M 193 275 L 197 290" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="165" y="285" font-family="serif" font-size="12" fill="#7c3aed">−∞</text>
  
  <!-- Function label -->
  <text x="300" y="100" font-family="serif" font-size="15" fill="#2563eb">f(x) = </text>
  <text x="355" y="92" font-family="serif" font-size="14" fill="#2563eb">1</text>
  <line x1="353" y1="97" x2="367" y2="97" stroke="#2563eb" stroke-width="1"/>
  <text x="355" y="112" font-family="serif" font-size="14" fill="#2563eb">x</text>
  
  <!-- Limit annotations -->
  <text x="60" y="55" font-family="serif" font-size="11" fill="#1e293b">lim f(x) = −∞</text>
  <text x="60" y="42" font-family="serif" font-size="9" fill="#1e293b">x→0⁻</text>
  
  <text x="60" y="80" font-family="serif" font-size="11" fill="#1e293b">lim f(x) = +∞</text>
  <text x="60" y="67" font-family="serif" font-size="9" fill="#1e293b">x→0⁺</text>
  
  <!-- Contrast note -->
  <text x="200" y="310" font-family="serif" font-size="11" fill="#64748b" text-anchor="middle">
    Opposite signs from left and right (contrast with 1/x²)
  </text>
</svg>
