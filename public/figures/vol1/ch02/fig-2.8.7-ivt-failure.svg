<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="80" x2="370" y2="80"/>
    <line x1="50" y1="130" x2="370" y2="130"/>
    <line x1="50" y1="180" x2="370" y2="180"/>
    <line x1="50" y1="230" x2="370" y2="230"/>
  </g>
  
  <!-- Axes -->
  <line x1="50" y1="230" x2="385" y2="230" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="280" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="390" y="235" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="32" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- x = a and x = b markers -->
  <text x="97" y="248" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">a</text>
  <text x="297" y="248" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">b</text>
  <line x1="100" y1="227" x2="100" y2="233" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="300" y1="227" x2="300" y2="233" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- y = N horizontal line (the target value) -->
  <line x1="50" y1="155" x2="370" y2="155" stroke="#f97316" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="25" y="160" font-family="serif" font-size="13" fill="#f97316">N</text>
  
  <!-- Step function (discontinuous) -->
  <!-- Lower step: f(a) below N -->
  <path d="M 100 200 L 200 200" stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Upper step: f(b) above N -->
  <path d="M 200 100 L 300 100" stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Jump at x = c (discontinuity) -->
  <line x1="200" y1="200" x2="200" y2="100" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  
  <!-- Endpoints -->
  <circle cx="100" cy="200" r="5" fill="#2563eb"/>
  <circle cx="300" cy="100" r="5" fill="#2563eb"/>
  
  <!-- Open and closed circles at jump -->
  <circle cx="200" cy="200" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="200" cy="100" r="5" fill="#2563eb"/>
  
  <!-- f(a) and f(b) labels -->
  <line x1="47" y1="200" x2="53" y2="200" stroke="#1e293b" stroke-width="1.5"/>
  <text x="15" y="205" font-family="serif" font-size="11" fill="#1e293b">f(a)</text>
  <line x1="47" y1="100" x2="53" y2="100" stroke="#1e293b" stroke-width="1.5"/>
  <text x="15" y="105" font-family="serif" font-size="11" fill="#1e293b">f(b)</text>
  
  <!-- Jump discontinuity label -->
  <text x="210" y="155" font-family="serif" font-size="11" fill="#dc2626">jump!</text>
  
  <!-- No intersection annotation -->
  <text x="240" y="175" font-family="serif" font-size="11" fill="#f97316">y = N never</text>
  <text x="240" y="190" font-family="serif" font-size="11" fill="#f97316">achieved!</text>
  
  <!-- X mark where there should be intersection -->
  <text x="193" y="160" font-family="serif" font-size="20" fill="#dc2626">✗</text>
  
  <!-- Description box -->
  <rect x="50" y="260" width="320" height="50" fill="#fee2e2" stroke="#dc2626" stroke-width="1" rx="4"/>
  <text x="65" y="280" font-family="serif" font-size="11" fill="#991b1b">
    IVT Failure: f(a) &lt; N &lt; f(b), but no c where f(c) = N.
  </text>
  <text x="65" y="297" font-family="serif" font-size="11" fill="#991b1b">
    Continuity is REQUIRED for the IVT to apply.
  </text>
</svg>
