<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="170" x2="370" y2="170"/>
    <line x1="50" y1="220" x2="370" y2="220"/>
  </g>
  
  <!-- Axes -->
  <line x1="50" y1="270" x2="380" y2="270" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="280" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="385" y="275" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="30" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- The curve y = f(x) - a smooth increasing curve -->
  <path d="M 70 250 Q 120 240, 150 200 Q 180 160, 220 140 Q 260 120, 300 90 Q 340 60, 360 55" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Points P and Q -->
  <circle cx="120" cy="230" r="5" fill="#f97316"/>
  <circle cx="280" cy="105" r="5" fill="#f97316"/>
  
  <!-- Point labels -->
  <text x="105" y="250" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">P</text>
  <text x="290" y="100" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">Q</text>
  
  <!-- Secant line through P and Q -->
  <line x1="80" y1="255" x2="330" y2="74" stroke="#64748b" stroke-width="2"/>
  
  <!-- Rise/Run triangle -->
  <line x1="120" y1="230" x2="280" y2="230" stroke="#059669" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="280" y1="230" x2="280" y2="105" stroke="#059669" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Delta x label -->
  <text x="180" y="250" font-family="serif" font-size="13" fill="#059669">Δx = b − a</text>
  
  <!-- Delta y label -->
  <text x="290" y="175" font-family="serif" font-size="13" fill="#059669">Δy</text>
  
  <!-- Coordinate labels -->
  <text x="110" y="285" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">a</text>
  <text x="275" y="285" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">b</text>
  
  <!-- f(a) and f(b) on y-axis -->
  <line x1="47" y1="230" x2="53" y2="230" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="47" y1="105" x2="53" y2="105" stroke="#1e293b" stroke-width="1.5"/>
  <text x="20" y="235" font-family="serif" font-size="11" font-style="italic" fill="#1e293b">f(a)</text>
  <text x="20" y="110" font-family="serif" font-size="11" font-style="italic" fill="#1e293b">f(b)</text>
  
  <!-- Dashed lines to axes -->
  <line x1="120" y1="230" x2="120" y2="270" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="105" x2="280" y2="270" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="120" y1="230" x2="50" y2="230" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="105" x2="50" y2="105" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Slope annotation -->
  <text x="200" y="30" font-family="serif" font-size="14" fill="#64748b" text-anchor="middle">
    Slope = 
  </text>
  <text x="270" y="30" font-family="serif" font-size="14" fill="#64748b">
    Δy/Δx = [f(b)−f(a)]/(b−a)
  </text>
  
  <!-- Curve label -->
  <text x="355" y="75" font-family="serif" font-size="14" font-style="italic" fill="#2563eb">y = f(x)</text>
  
  <!-- Secant label -->
  <text x="310" y="55" font-family="serif" font-size="12" fill="#64748b">secant line</text>
</svg>
