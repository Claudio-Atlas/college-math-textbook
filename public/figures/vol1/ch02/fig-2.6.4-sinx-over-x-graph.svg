<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 280" width="450" height="280">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="450" height="280" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="40" y1="180" x2="420" y2="180" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="225" y1="260" x2="225" y2="20" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="425" y="185" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="230" y="15" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Origin -->
  <text x="230" y="195" font-family="serif" font-size="12" fill="#1e293b">0</text>
  
  <!-- y = 1 reference line -->
  <line x1="40" y1="80" x2="420" y2="80" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="222" y1="80" x2="228" y2="80" stroke="#1e293b" stroke-width="1"/>
  <text x="208" y="85" font-family="serif" font-size="12" fill="#1e293b">1</text>
  
  <!-- x-axis ticks for π values -->
  <line x1="130" y1="177" x2="130" y2="183" stroke="#1e293b" stroke-width="1"/>
  <text x="122" y="198" font-family="serif" font-size="10" fill="#1e293b">−π</text>
  
  <line x1="320" y1="177" x2="320" y2="183" stroke="#1e293b" stroke-width="1"/>
  <text x="315" y="198" font-family="serif" font-size="10" fill="#1e293b">π</text>
  
  <!-- sin(x)/x curve -->
  <!-- Main curve with central maximum at x=0, y=1 (but undefined there) -->
  <path d="M 50 175 Q 70 190, 90 185 Q 110 165, 130 180 Q 150 210, 170 180 
           Q 190 120, 210 85 Q 220 75, 225 80 Q 230 75, 240 85 
           Q 260 120, 280 180 Q 300 210, 320 180 Q 340 165, 360 185 Q 380 190, 410 175" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Open circle at (0, 1) - function undefined but limit = 1 -->
  <circle cx="225" cy="80" r="5" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  
  <!-- Arrow pointing to the limit -->
  <path d="M 260 55 Q 250 65, 235 75" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="265" y="55" font-family="serif" font-size="12" fill="#f97316">limit = 1</text>
  
  <!-- Function label -->
  <text x="340" y="50" font-family="serif" font-size="14" fill="#2563eb">f(x) = </text>
  <text x="395" y="42" font-family="serif" font-size="13" fill="#2563eb">sin x</text>
  <line x1="393" y1="47" x2="430" y2="47" stroke="#2563eb" stroke-width="1"/>
  <text x="403" y="62" font-family="serif" font-size="13" fill="#2563eb">x</text>
  
  <!-- The fundamental limit -->
  <text x="225" y="240" font-family="serif" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">
    lim (sin x)/x = 1
  </text>
  <text x="183" y="248" font-family="serif" font-size="10" fill="#1e293b">x→0</text>
</svg>
