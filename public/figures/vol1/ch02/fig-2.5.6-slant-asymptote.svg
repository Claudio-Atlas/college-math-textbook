<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 380" width="450" height="380">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="450" height="380" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="40" y1="220" x2="420" y2="220" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="360" x2="200" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="425" y="225" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="205" y="25" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Tick marks -->
  <line x1="250" y1="217" x2="250" y2="223" stroke="#1e293b" stroke-width="1"/>
  <text x="247" y="238" font-family="serif" font-size="11" fill="#1e293b">1</text>
  
  <!-- Vertical asymptote at x = 1 (pixel 250) -->
  <line x1="250" y1="40" x2="250" y2="350" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- Slant asymptote y = x + 3 -->
  <!-- At x=0, y=3; at x=4, y=7; scaling 50px per unit -->
  <line x1="40" y1="310" x2="420" y2="70" stroke="#059669" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- f(x) = (x² + 2x + 1)/(x - 1) = x + 3 + 4/(x-1) -->
  <!-- Left branch: x < 1, approaches slant from below as x→-∞ -->
  <path d="M 50 315 Q 80 310, 120 290 Q 160 260, 190 180 Q 210 100, 230 50 Q 240 35, 245 32" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Right branch: x > 1, approaches slant from above as x→+∞ -->
  <path d="M 255 350 Q 260 320, 270 250 Q 290 180, 320 140 Q 360 100, 410 78" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Asymptote labels -->
  <text x="255" y="320" font-family="serif" font-size="12" fill="#dc2626">VA: x = 1</text>
  
  <text x="340" y="55" font-family="serif" font-size="12" fill="#059669">Slant asymptote</text>
  <text x="355" y="70" font-family="serif" font-size="12" fill="#059669">y = x + 3</text>
  
  <!-- Function label -->
  <text x="60" y="100" font-family="serif" font-size="15" fill="#2563eb">f(x) = </text>
  <text x="115" y="88" font-family="serif" font-size="13" fill="#2563eb">x² + 2x + 1</text>
  <line x1="115" y1="93" x2="210" y2="93" stroke="#2563eb" stroke-width="1"/>
  <text x="150" y="110" font-family="serif" font-size="13" fill="#2563eb">x − 1</text>
  
  <!-- Division result -->
  <text x="60" y="135" font-family="serif" font-size="12" fill="#64748b">= x + 3 + </text>
  <text x="140" y="128" font-family="serif" font-size="11" fill="#64748b">4</text>
  <line x1="135" y1="133" x2="165" y2="133" stroke="#64748b" stroke-width="1"/>
  <text x="140" y="148" font-family="serif" font-size="11" fill="#64748b">x − 1</text>
  
  <!-- Explanation -->
  <text x="225" y="370" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    When deg(num) = deg(denom) + 1, there is a slant (oblique) asymptote.
  </text>
</svg>
