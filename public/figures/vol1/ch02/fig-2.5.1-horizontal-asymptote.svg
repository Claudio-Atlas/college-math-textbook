<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 320" width="450" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="450" height="320" fill="#ffffff"/>
  
  <!-- Axes -->
  <line x1="40" y1="160" x2="420" y2="160" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="225" y1="290" x2="225" y2="30" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="425" y="165" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="230" y="25" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Origin -->
  <text x="230" y="175" font-family="serif" font-size="12" fill="#1e293b">0</text>
  
  <!-- Horizontal asymptote y = 0 (emphasized) -->
  <line x1="40" y1="160" x2="420" y2="160" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  
  <!-- f(x) = 1/x -->
  <!-- Right branch: x > 0 -->
  <path d="M 235 55 Q 250 90, 270 120 Q 300 145, 350 155 Q 400 158, 420 159" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Left branch: x < 0 -->
  <path d="M 50 161 Q 100 162, 150 165 Q 180 175, 200 200 Q 210 240, 215 280" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Arrows showing approach to asymptote -->
  <path d="M 385 155 L 410 158" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 85 162 L 55 161" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- +∞ and -∞ directions -->
  <text x="395" y="145" font-family="serif" font-size="12" fill="#059669">x → +∞</text>
  <text x="55" y="150" font-family="serif" font-size="12" fill="#059669">x → −∞</text>
  
  <!-- HA label -->
  <text x="330" y="185" font-family="serif" font-size="13" fill="#dc2626">HA: y = 0</text>
  
  <!-- Function label -->
  <text x="280" y="70" font-family="serif" font-size="15" fill="#2563eb">f(x) = </text>
  <text x="335" y="62" font-family="serif" font-size="14" fill="#2563eb">1</text>
  <line x1="333" y1="67" x2="347" y2="67" stroke="#2563eb" stroke-width="1"/>
  <text x="335" y="82" font-family="serif" font-size="14" fill="#2563eb">x</text>
  
  <!-- Limit annotations -->
  <text x="60" y="50" font-family="serif" font-size="13" fill="#1e293b">lim</text>
  <text x="50" y="65" font-family="serif" font-size="10" fill="#1e293b">x→+∞</text>
  <text x="90" y="57" font-family="serif" font-size="13" fill="#1e293b">f(x) = 0</text>
  
  <text x="60" y="95" font-family="serif" font-size="13" fill="#1e293b">lim</text>
  <text x="50" y="110" font-family="serif" font-size="10" fill="#1e293b">x→−∞</text>
  <text x="90" y="102" font-family="serif" font-size="13" fill="#1e293b">f(x) = 0</text>
  
  <!-- Explanation -->
  <text x="225" y="305" font-family="serif" font-size="12" fill="#1e293b" text-anchor="middle">
    As x → ±∞, the function approaches but never touches the horizontal asymptote.
  </text>
</svg>
