<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="170" x2="370" y2="170"/>
    <line x1="50" y1="220" x2="370" y2="220"/>
  </g>
  
  <!-- Axes -->
  <line x1="50" y1="270" x2="380" y2="270" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="280" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="385" y="275" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="30" font-family="serif" font-size="16" font-style="italic" fill="#1e293b">y</text>
  
  <!-- Left piece: y = x² + 1 for x < 2 -->
  <path d="M 60 220 Q 90 250, 100 245 Q 130 230, 150 200 Q 170 170, 190 130" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Right piece: y = -x + 5 for x ≥ 2 -->
  <path d="M 190 180 L 360 95" 
        stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Open circle at left limit (x=2, y approaching from left) -->
  <circle cx="190" cy="130" r="5" fill="#ffffff" stroke="#f97316" stroke-width="2"/>
  
  <!-- Filled circle at right value (x=2, y=3 scaled) -->
  <circle cx="190" cy="180" r="5" fill="#f97316"/>
  
  <!-- Dashed line showing x = 2 -->
  <line x1="190" y1="270" x2="190" y2="70" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Left limit annotation -->
  <text x="100" y="115" font-family="serif" font-size="12" fill="#059669">lim f(x) = L₁</text>
  <text x="100" y="130" font-family="serif" font-size="12" fill="#059669">x→a⁻</text>
  <path d="M 95 120 Q 130 125, 180 130" stroke="#059669" stroke-width="1" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Right limit annotation -->
  <text x="250" y="200" font-family="serif" font-size="12" fill="#059669">lim f(x) = L₂</text>
  <text x="250" y="215" font-family="serif" font-size="12" fill="#059669">x→a⁺</text>
  <path d="M 245 205 L 200 185" stroke="#059669" stroke-width="1" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- x = a label -->
  <text x="183" y="290" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">a</text>
  
  <!-- L₁ and L₂ on y-axis -->
  <line x1="47" y1="130" x2="53" y2="130" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="47" y1="180" x2="53" y2="180" stroke="#1e293b" stroke-width="1.5"/>
  <text x="25" y="135" font-family="serif" font-size="12" fill="#1e293b">L₁</text>
  <text x="25" y="185" font-family="serif" font-size="12" fill="#1e293b">L₂</text>
  
  <!-- Title -->
  <text x="200" y="25" font-family="serif" font-size="13" fill="#64748b" text-anchor="middle">
    Piecewise function: L₁ ≠ L₂ (limit DNE at x = a)
  </text>
</svg>
