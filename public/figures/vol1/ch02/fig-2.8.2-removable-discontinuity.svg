<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="320" fill="#ffffff"/>
  
  <!-- Grid (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50" y1="50" x2="50" y2="270"/>
    <line x1="100" y1="50" x2="100" y2="270"/>
    <line x1="150" y1="50" x2="150" y2="270"/>
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="250" y1="50" x2="250" y2="270"/>
    <line x1="300" y1="50" x2="300" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/>
    <line x1="50" y1="70" x2="370" y2="70"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="170" x2="370" y2="170"/>
    <line x1="50" y1="220" x2="370" y2="220"/>
  </g>
  
  <!-- Axes -->
  <line x1="50" y1="220" x2="385" y2="220" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="50" y1="280" x2="50" y2="40" stroke="#1e293b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis labels -->
  <text x="390" y="225" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">x</text>
  <text x="45" y="32" font-family="serif" font-size="14" font-style="italic" fill="#1e293b">y</text>
  
  <!-- The line y = x + 1 (with hole) -->
  <!-- Left part -->
  <path d="M 60 210 L 195 75" stroke="#2563eb" stroke-width="2.5" fill="none"/>
  <!-- Right part -->
  <path d="M 205 65 L 370 -100" stroke="#2563eb" stroke-width="2.5" fill="none" clip-path="url(#clip)"/>
  <path d="M 205 65 L 350 -80" stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Actually clip properly - draw right segment -->
  <path d="M 205 65 L 350 50" stroke="#2563eb" stroke-width="2.5" fill="none"/>
  
  <!-- Hole at x = a (the limit point) -->
  <circle cx="200" cy="70" r="6" fill="#ffffff" stroke="#f97316" stroke-width="2.5"/>
  
  <!-- Defined value at a different y (case where f(a) exists but ≠ L) -->
  <circle cx="200" cy="170" r="5" fill="#dc2626"/>
  
  <!-- x = a label -->
  <line x1="200" y1="217" x2="200" y2="223" stroke="#1e293b" stroke-width="1.5"/>
  <text x="195" y="238" font-family="serif" font-size="12" font-style="italic" fill="#1e293b">a</text>
  
  <!-- Dashed vertical line at x = a -->
  <line x1="200" y1="70" x2="200" y2="220" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- L label (the limit) -->
  <line x1="47" y1="70" x2="53" y2="70" stroke="#1e293b" stroke-width="1.5"/>
  <text x="30" y="75" font-family="serif" font-size="12" fill="#1e293b">L</text>
  
  <!-- f(a) label (the actual value) -->
  <line x1="47" y1="170" x2="53" y2="170" stroke="#1e293b" stroke-width="1.5"/>
  <text x="20" y="175" font-family="serif" font-size="12" fill="#1e293b">f(a)</text>
  
  <!-- Annotations -->
  <text x="215" y="65" font-family="serif" font-size="11" fill="#f97316">lim f(x) = L</text>
  <text x="215" y="80" font-family="serif" font-size="10" fill="#f97316">x→a</text>
  
  <text x="215" y="175" font-family="serif" font-size="11" fill="#dc2626">f(a) ≠ L</text>
  
  <!-- Description box -->
  <rect x="50" y="255" width="320" height="55" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="4"/>
  <text x="65" y="275" font-family="serif" font-size="11" fill="#92400e">
    Removable Discontinuity: The limit exists at x = a,
  </text>
  <text x="65" y="292" font-family="serif" font-size="11" fill="#92400e">
    but either f(a) is undefined OR f(a) ≠ lim f(x).
  </text>
  <text x="245" y="305" font-family="serif" font-size="10" fill="#92400e">x→a</text>
</svg>
