<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  
  <!-- Connections (drawn first, behind nodes) -->
  <g stroke-width="0.7" opacity="0.5" filter="url(#glow)">
    <!-- Input to middle -->
    <line x1="7" y1="10" x2="16" y2="8" stroke="#00d4ff"/>
    <line x1="7" y1="16" x2="16" y2="8" stroke="#00d4ff"/>
    <line x1="7" y1="16" x2="16" y2="16" stroke="#00d4ff"/>
    <line x1="7" y1="16" x2="16" y2="24" stroke="#00d4ff"/>
    <line x1="7" y1="22" x2="16" y2="16" stroke="#00d4ff"/>
    <line x1="7" y1="22" x2="16" y2="24" stroke="#00d4ff"/>
    <line x1="7" y1="10" x2="16" y2="16" stroke="#00d4ff"/>
    <!-- Middle to output -->
    <line x1="16" y1="8" x2="25" y2="10" stroke="#00d4ff"/>
    <line x1="16" y1="8" x2="25" y2="16" stroke="#00d4ff"/>
    <line x1="16" y1="16" x2="25" y2="10" stroke="#00d4ff"/>
    <line x1="16" y1="16" x2="25" y2="16" stroke="#00d4ff"/>
    <line x1="16" y1="16" x2="25" y2="22" stroke="#00d4ff"/>
    <line x1="16" y1="24" x2="25" y2="16" stroke="#00d4ff"/>
    <line x1="16" y1="24" x2="25" y2="22" stroke="#00d4ff"/>
  </g>
  
  <!-- Input nodes (violet) -->
  <g filter="url(#glow)">
    <circle cx="7" cy="10" r="2.2" fill="#bf5fff"/>
    <circle cx="7" cy="16" r="2.2" fill="#bf5fff"/>
    <circle cx="7" cy="22" r="2.2" fill="#bf5fff"/>
  </g>
  
  <!-- Middle nodes (cyan) -->
  <g filter="url(#glow)">
    <circle cx="16" cy="8" r="2.2" fill="#00d4ff"/>
    <circle cx="16" cy="16" r="2.2" fill="#00d4ff"/>
    <circle cx="16" cy="24" r="2.2" fill="#00d4ff"/>
  </g>
  
  <!-- Output nodes (violet) -->
  <g filter="url(#glow)">
    <circle cx="25" cy="10" r="2.2" fill="#bf5fff"/>
    <circle cx="25" cy="16" r="2.2" fill="#bf5fff"/>
    <circle cx="25" cy="22" r="2.2" fill="#bf5fff"/>
  </g>
</svg>
